body:
  text: 孝經集傳卷二明黄道周撰三才章第七曽子曰甚哉孝之大也子曰夫孝天之經也地之義也民之行也天地之經而民是則之則天之明因地之利以順天下是以其教不肅而成其政不嚴而治經者天之常也義者地之制也天有常制地不敢變法之則明因之則利舎是則無以和睦於上下故孝者天下之大順也易曰乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可乆則賢人之徳可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣故孝者聖賢所以成位也易知簡能是天地之經義也先王見教之可以化民也是故先之以博愛而民莫遺其親陳之以徳義而民興行身之以敬譲而民不爭道之以禮樂而民和睦示之以好惡而民知禁教作孝孝而可以化民則嚴肅之治何所用乎孝教也教以因道道以因性行其至順而先王無事焉博愛者孝之施也徳義者孝之制也敬譲者孝之致也禮樂者孝之文也好惡者孝之情也五者先王之所以教也虞書曰百姓不親五品不遜汝作司徒敬敷五教在寛敬寛在於上親遜著於下二者唐虞之所以成治也以唐虞之教成唐虞之治而聖賢徳業配於天地矣詩云赫赫師尹民具爾瞻言夫嚴肅之不可為治也記曰父之親子也親賢而下無能母之親子也賢則親之無能則憐之母親而不尊父尊而不親水之於民也親而不尊火尊而不親土之於民也親而不尊天尊而不親父母天地尊親之合也親以致其愛尊以致其敬愛以去惡敬以去慢二者立而天下化之赫赫師尹夫猶有政刑之心乎傳曰有國者不可不慎辟則為天下僇矣具瞻所以教慎也慎者敬之始也右經第七章大傳第七子曰夫民教之以徳齊之以禮則民有格心教之以政齊之以刑則民有遯心故君民者子以愛之則民親之信以結之則民不倍恭以涖之則民有孫心甫刑曰苖民匪用命制以刑惟作五虐之刑曰法是以民有惡徳而遂絶其世也甚哉嚴刑肅法之不可以治也五虐之去五教也逺矣子愛信結恭涖猶未至於言孝也然而可以觀徳焉徳者教之所自出也教立而後禮行禮行猶水之而後徳著徳者善之所歸也孟子曰人性之善也就下人無有不善水無有不下堯舜之民多善而苗民以惡徳特聞夫豈其性然哉徳教失於上嚴刑束於下從之不可乃有遯心易曰不惡而嚴亦謂遯也記曰聖人參於天地竝於鬼神以治政也處其所存禮之序也玩其所樂民之治也故天生時而地生財人父生而師教之四者君以正用之故君者立於無過之地也天之生時則曰明地之生財則曰利本於自然則曰生因其本然則曰教君得四正而用其經義故先王之為治以章明經義處其所存玩其所樂非謂其有嚴肅之令能鬼神其事也故君者天地父師之正也用其正而不敢有過故以則人而人則之以養人而人養之以事人而人事之天地所謂孝子則無不孝子鬼神所謂仁人則無不仁人者矣子曰禹立三年天下遂仁夫非大禹而能如是乎詩曰成王之孚下土之式是之謂也夫禮必本於太一分而為天地轉而為隂陽變而為四時列而為鬼神其降曰命其官於天也夫禮必本於天動而之地列而之事變而從時協於分藝其居人也曰養故禮義也者人之大端也所以講信修睦而固人肌膚之㑹筋骸之束也所以養生送死事鬼神之大端也所以達天道順人情之大竇也欲達天道順人情則舎孝何以乎孝者天地之情鬼神之用隂陽四時所相報荅也易本於太極太極生兩儀兩儀生四象四象生八卦八卦分列五行式序坤艮交應金水火木互相起也聖人之道貴生而惡殺故帝出於東方齊於㢲相見於離厚生於木而後火受之母立於西南恱於兊致勞於坎厚生於金而後水受之天地水火風雷山澤則各以四正互相荅也是天地之經義也乾坤父母即為君臣水火男女即為夫婦風雷山澤别其長幼居於四隅以奉正配不相凟也二老言慈六子言孝慈愛孝弟将之以敬而後太極立也順莫順於後天文王之事周公之志也嚴莫嚴於先天宓羲之事神農黄帝堯舜之志也知其說者以因天明則地利成教於天下則何嚴刑肅令之有乎聖人作則必以天地為本以隂陽為端以四時為柄以日星為紀月以為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜民者則天地者也聖人者作則者也先天地而後隂陽四時以次隂陽日星以次四時月以次日星鬼神以次日月六者易之序也易貴兩畜文徳所聚盖言孝也然則四靈為畜不可以已乎曰是文徳也聖賢君子之所以類起也君子本於天地端於隂陽柄於四時皆以治本也四時為柄故有生有成日星為紀故夙夜不貸月以為量故不逺而復鬼神為徒故陟降左右五行為質故反始明報禮義為噐故言行有物人情為田故不失其實四靈為畜故中和可得是十者皆孝也非孝則民無所則民無所則天地隂陽日星五行皆為虚器矣是以聖人慎所以教之曰言不過辭動不過則是之謂也河間獻王問温城董君曰夫孝天之經地之義何謂也對曰天有五行木火土金水也水為冬金為秋土為季夏火為夏木為春春主生夏主長季夏主養秋主収冬主藏藏冬之所成也是故父之所生其子長之父之所長其子養之父之所飬其子成之諸父所為其子皆奉承而續行之不敢不致如父之意盡為子之道也故曰夫孝者天之經也王曰善哉願聞地之義對曰地出雲為雨起氣為風風雨者地之為也地不敢有其功名而上歸之天命若從天氣者故曰天風天雨也莫曰地風地雨也勤勞在地一歸於天非有至義孰能行此故下事上如地事天可謂大忠矣又曰土者火之子也五行莫貴於土土於四時無所命者不與火分功名忠臣之義孝子之行取之於土土者五行最貴也其義不可加矣五聲莫貴於宫五味莫美於甘五色莫貴於黄此謂孝者地之義也王曰善哉夫董君之論則猶有未盡也則天之明明莫大於日月明天之經經莫察於五緯日者父也君也月近於日三分距二其行必疾月逺於日三分距二其行必遲星近於日四十五度之内其行必疾四十五度之外其行必遲臣子所將迎於君父也日行有常温燠不為之加遲風雨不為之加疾月星之行風雨凉燠必變色而先告者臣子之教諫於君父也是天之經也因地之利利莫大於河海以義為利利莫大於就下江河所在百川趨之雖逺必赴雖險不懼不謀而逝或語或黙各至其所臣子所致命而遂志也及其至於海也淡者以鹹甘者以苦清者以混平者以怒涵湛萬里不戀其故若情之歸性性之歸命也不敢有所自執以争吾素是臣子之合力而同化也故曰則天之明因地之利以順天下利者天下之至順也孟子曰天下之言性也則故而已矣故者以利為本所惡於智者謂其鑿也禹之行水也行其所無事也如智者亦行其所無事則其智亦大矣天之髙也星辰之逺也苟求其故千嵗之日至可坐而致也若孟子則可與立教者矣天地之道寒暑不時則疾風雨不節則飢教者民之寒暑也教不時則傷世事者民之風雨也事不節則無功然則先王之為樂也以法治也善則行象徳矣故政與刑強民者也徳與教非強民者也天地之為寒暑必以時為風雨必以節所以順物之性集民之事也不時之寒暑無以慈不節之風雨無以孝萬物失其性則天地亦無以教也故因性之教天地之所至貴也詩曰民之秉彛好是懿徳樂者天地之和也禮者天地之序也和故百物皆化序故羣物皆别樂繇天作禮以地制過制則亂過作則暴明於天地然後能興禮樂也若是則中和之貴也仁義聖智則以中和為歸故無中和則無以見孝也天地之性致中以為寒暑致和以為風雨風雨出於山川寒暑本於日月寒暑不中風雨不和則日月山川亦無致孝於天地也詩曰旱既太甚滌滌山川又曰雨無正極傷我稼穡故中和致則愛敬生愛敬生則惡慢息惡慢息則暴亂之禍庶乎免矣暴亂禍免而後禮樂可作也天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉春作夏長仁也秋歛冬藏義也仁近於樂義近於禮樂者敦和率神而從天禮者别宜居鬼而從地禮樂者聖人所率鬼神而事天地也春夏秋冬天地之氣也氣有過勝氣有不及聖人為中和以柔之猶為裘葛湯水以御親之温凊也天地合化鬼足神行於其間猶魂魄藏於肝脾之内過盛過懾皆為厲天地父母不能自見而孝子良醫皆見之故為中和以調其氣為禮樂以劑其方不觀禮樂則不知仁人孝子之志也董生曰春喜夏樂秋憂冬悲以夏養春以冬喪秋大人之志也是故先愛而後嚴樂生而哀終夭之常也人資於天大徳而小刑是故人主近天之所近逺天之所逺大天之所大小天之所小是故天數右陽而不右隂務徳而不務刑刑之不可任以成世也猶隂之不可任以成嵗也為政而任刑謂之逆天非天道也故如董生則亦通於仁義禮樂之㫖者矣樂也者情之不可變者也禮也者理之不可易者也樂統同禮辨異禮樂之說管乎人情矣窮本知變樂之情也著誠去偽禮之經也禮樂偩天地之情達神明之徳降興上下之神而凝精粗之體領父子君臣之節是故大人舉禮樂則天地将為昭焉通情理而言之猶未及於性也惟是窮本知變者得其經義則不變之情非性而何乎情不變理不易故神明司教而天地之經義可則也孟子曰仁之實事親是也義之實從兄是也智之實知斯二者弗去是也禮之實節文斯二者樂之實樂斯二者樂則生矣生則惡可已惡可已則不知手之舞之足之蹈之是則謂不易不變昭於天地者矣詩曰永言孝思昭哉嗣服嗣天地而昭日月則亦此志也記曰禮樂不可斯須去身致禮以治躬則荘敬荘敬則嚴威致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則久久則天天則神天則不言而信神則不怒而威若此則教化之所從出也教先於身身先於心心治則身治身治而後天下可治也為樂不足以治心為禮不足以治身而曰則天因地以順天下則其道絀而不可繼矣大學傳曰堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之其所令反其所好而民不從是故君子有諸己而後求諸人無諸己而後非諸人所藏乎身不恕而能喻諸人者未之有也故恕者合愛敬而出之也合愛敬而出之又合愛敬而藏之而後惡慢去於身惡慢去於身而後徳教加於人孟子曰反身而誠樂莫大焉強恕而行求仁莫近焉不誠不恕而以則天因地故求之日以至去之日以逺也中心斯須不和不樂則鄙詐之心入之矣外貌斯須不荘不敬則慢易之心入之矣故樂也者動於内者也禮也者動於外者也樂極和禮極順内和而外順則民瞻其顔色而弗與争也望其容貌而民不生慢易焉故徳煇動於内而民莫不承聴理發於外而民莫不承順故曰致禮樂之道舉而措之天下無難矣鄙詐者何盖言惡也易慢者何盖言慢也惡慢見於一人則愛敬弛於天下禮樂者愛敬之極也愛以導和敬以導順内和外順故博愛徳義敬譲禮樂因之而生故舎愛敬先王無以為教也非無以為教亦無以為身非無以為身亦無以為心孟子曰君子所以異於人者以其存心也君子以仁存心以禮存心鄙詐易慢則庶乎逺矣樂者為同禮者為異同則相親異則相敬樂勝則流禮勝則離合情飾貌者禮樂之事也禮義立則貴賤等矣樂文同則上下和矣好惡著則賢不肖别矣刑禁暴爵舉賢則政均矣仁以愛之義以正之如此則民治行矣夫以孝為教者好惡刑禁亦何所事乎曰聖人治民有不得已也博愛以先之徳義以敶之敬譲以申之禮樂以道之而民性未動先王亦曰民未知禁也示之以好惡使知禁焉耳好惡者聖人之心行也董生曰人主之好惡喜怒乃天之煖清寒暑也不可不審禁而出也當暑而寒當寒而暑必為惡歳也人主當喜而怒當怒而喜必為亂世矣故人主之大守在於謹藏而禁内使好惡喜怒必當義乃出若煖清寒暑之當時乃發也則可謂参天矣董生亦得中和之意也然而未本本者反身之謂也孟子曰愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸己其身正而天下歸之記曰樂者施也禮者報也樂樂其所自生禮反其所自始報情反始則通於先王之所教治者矣禮主其減樂主其盈禮減而進以進為文樂盈而反以反為文禮減而不進則銷樂盈而不反則放故禮有報而樂有反禮得其報則樂樂得其反則安禮之報樂之反其義一也報反者敬譲之謂也敬譲者孝子所謂禮樂也孝子之於天下無所好惡其所好者觀樂以知盈其所惡者觀禮以知減減而得其報盈而得其反合同而化反心而安如此而已矣大禮之報天地大樂之反祖考是仁人孝子之志也然而仁人孝子不敢以為教仁人孝子亦曰吾幸而得愛敬之報亦幸而不受惡慢之反云耳詩云投我以桃報之以李彼童而角實虹小子是古人所致其敬讓也匡衡曰朝有變色之言則下有爭闘之患上有自専之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有竊盜之民是仁人孝子所亟反於本也樂繇中出禮自外作樂繇中出故静禮自外作故文大樂必易大禮必簡樂至則無怨禮至則不争揖讓而治天下者禮樂之謂也禮樂之易簡夫非孝弟而何乎至孝則無怨至弟則不争孝非内也弟非外也而至孝多情至弟多文或以内順或以外順内外交讓而至教被於天下矣故讓者孝敬之著於外者也書曰允恭克讓光被四表格于上下克明俊徳以親九族九族既睦平章百姓百姓昭明是堯舜之化也孟子曰堯舜之道孝弟而已矣子言之君子貴人而賤己先人而後己則民作讓又云有國家者貴人而賤禄則民興讓尚技而賤車則民興藝又云善則稱人過則稱己則民不争善則稱人過則稱己則怨益亡又云善則稱人過則稱己則民讓善善則稱君過則稱己則民作忠甚哉教者之通於性也民性好善示之以善無不任與之以善又無不讓也任善而喜喜出於愛愛以為樂讓善而若愧愧出於敬敬以為禮聖人與人一言而博愛徳義敬讓禮樂好惡皆備者與善之謂也孟子曰君子莫大乎與人為善與人為善天地之經羲也天子有善譲徳於天諸侯有善歸諸天子卿大夫有善薦於諸侯士庶人有善本諸父母存諸長老禄爵慶賞成諸宗廟所以示順也天地日月山川嶽瀆此四者皆譲也故譲孝之實也子曰能以禮譲為國乎何有不能以禮讓為國如禮何大學傳曰一家仁一國興仁一家讓一國興讓一人貪戾一國作亂言因性立教者之好惡不可不審也本愛本敬去惡去慢以明順於天下非譲莫繇矣故曰讓者孝之實也右傳十五則孝治章第八子曰昔者明王之以孝治天下也不敢遺小國之臣而况於公侯伯子男乎故得萬國之懽心以事其先王愛敬著於心則惡慢逺於人惡慢著於心則怨讟生於下矣聚順承懽人道之至大者也易曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考夫得萬國而不得其懽心雖得萬國安用乎孟子曰天下大恱而将歸已親天下恱而歸已猶草芥也惟舜為然舜盡事親之道而瞽瞍底豫瞽瞍底豫而天下化瞽瞍底豫而天下之為父子者定若舜可謂得萬國之歡心者矣詩曰媚兹一人應侯順徳舜之謂也治國者不敢侮於鰥寡而况於士民乎故得百姓之懽心以事其先君治國而侮士民則驕溢之過也驕溢者富貴之過也驕溢不長存富貴不長保故失社禝怒人民者比比也書曰懐保小民恵鮮鰥寡自朝至於日中昃不遑暇食用咸和萬民詩曰惠于宗公神罔是怨神罔是恫文王之謂也治家者不敢失於臣妾而况於妻子乎故得人之懽心以事其親言非法言行非法行則其臣妾妻子意而薄之矣又以富貴怒其妻子則是絶祀也孟子曰身不行道不行於妻子使人不以道不能行於妻子以孝為治者常思其親則親愛畏敬賤惡哀矜傲惰此五僻者無繇而生也夫愛敬而亦有僻者乎愛敬不於其親而愛敬它人故其親怒於上而衆怨於下也夫然故生則親安之祭則鬼享之是以天下和平災害不生禍亂不作故明王之以孝治天下也如此甚矣聚順之大也聚天下之懽心以致二人之養是薦上帝配祖考之所從始也生則聚順以為養死則聚順以為祭去人之力而用其志用人之志而萃其心是仁人孝子之極致也孟子曰桀紂之失天下也失其民也失其民者失其心也得天下有道得其民斯得天下矣得其民有道得其心斯得民矣夫不得民之心而欲以飬其親猶以草澤之牛豕為智也詩曰綏以多福俾緝熈于純嘏多福純嘏非合天下之愛敬而能之乎詩云有覺徳行四國順之覺者所為教也教者所為孝也民心不懽天下不順雖貞子無以順於父母故災害禍亂則民心之不順為之也和氣生則衆志平衆志平則怨惡息天人交應而鬼神從之書曰協和萬邦黎民於變時雍盖言順也唐虞之治非聚衆順而能有此乎故曰明於順然後能守危也是之謂也右經第八章大傳第八昔者聖人建隂陽天地之情立以為易易抱龜南面天子卷冕北面雖有明知之心必進斷其志焉示不敢専以尊天也尊大者至天子而極矣北面以受著龜則又何惡慢之有乎古者諸侯之卿士見於天子皆有宴享勞來焉大夫而下猶使卿士燕之所以達萬國之情也賈生曰大禹之治天下也諸侯萬人禹壹皆知其體禹豈能聞見而識之也諸侯朝㑹禹親服之其士月朝禹親見之是以禹一皆知其體也然且禹猶大恐諸侯㑹則問諸侯曰諸侯以寡人為驕乎朔日士朝則問於士曰諸大夫以寡人為汰乎聞寡人之驕汰不告寡人者是㓕天下之教也寡人之所惡也故如禹者則可謂以孝立教者矣天下諸侯聖禹而神鯀不言鯀之罪又從而神之則亦謂此也天子視學大昕鼓徴所以警衆也天子至命有司行事興秩節祭先師先聖焉有司卒事反命始適東序釋奠於先老遂設三老五更羣老之席位焉適饌省醴養老之珍具遂發咏焉退修之以孝養也反登歌清廟既歌而語言君臣父子長幼之道合徳音之致禮之大者也下管象舞大武大合衆以事逹有神興有徳也正君臣之位貴賤之等有司告以樂闋王乃命公侯伯子男及羣吏曰反飬老幼于東序終之以仁也記曰古之人一舉而衆知其徳之備也衆知其徳之備則其懽心安徃乎故記之致詳者視學是也始慮之以大既愛之以敬行之以禮修之以孝養紀之以義終之以仁自鼓徴而興秩釋奠而設位適饌省醴而發咏修飬而登歌登歌而道古管舞而合衆辨位而尚齒樂闋乃命畢養於東序凡十有五禮皆所以萃天下之歡心也萃天下之歡心非學孰始之乎詩曰於倫鼓鐘於樂辟雍鼉鼓逄逄矇瞍奏公是周人之樂文王也其馬蹻蹻其音昭昭載色載笑匪怒伊教是魯人之樂僖公也故道之可以懽樂邦國者莫學若也學而後燕射朝聘喪祭之務可以備禮也凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人修而兼用之五十飬於鄉六十飬於國七十飬於學達於諸侯八十拜君命一坐再至瞽亦如之九十使人受天子欲有問焉則就其室以珎從七十不俟朝八十月告存九十日有秩五十不從力政六十不與服戎七十不與賔客之事八十齊喪之事弗及也燕禮一獻坐而飲酒親之也饗禮體薦不食盈罇不飲尊之也食禮坐而不飲殽飯之設愛而致慤春夏燕饗秋冬用食則敬而文矣文者敬之將衰者也有虞氏皇而祭深衣而飬老夏后氏収而祭燕衣而飬老殷人冔而祭縞衣而飬老周人冕而祭𤣥衣而飬老凡三王飬老皆引年八十者一子不從政九十者其家不從政廢疾非人不飬者一人不從政父母之喪三年不從政齊衰大功之喪三月不從政冕而祭祭而後飬之夫有天地神明之意焉以天子之尊敬人之父兄神明其事尊若天地親若父母故道之可以懽樂於天下者則莫養老若也祭之道孫為王父尸所使為尸者於祭者子行也父北面而事之以明子事父之道也尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫尸飲九以散爵獻士及羣有司皆以齒先期旬有一日君夫人皆致齊乃㑹於太廟君純冕立於阼夫人副褘立於東房君執圭瓚祼尸大宗執璋瓚亞祼及迎牲君執紖卿大夫從士執芻宗婦執盎從夫人薦涗水君執鸞刀羞嚌夫人薦豆及入舞君執干戚就舞位君為東上冕而總干率其羣臣以樂皇尸是故天子之祭也與天下樂之諸侯之祭也與竟内樂之此其義也記曰禮之近於人情者非其至也祭之有尸三代共之以明祖孫之義焉以通神人之奥焉以嚴父子之報焉以敦親屬之紀焉四者而猶未盡也故三代皆用之天子之所不臣者二當其在師則不臣也當其在尸則不臣也故道之可樂者莫師與尸若也非為是可樂謂不如是則無以事其親天子行之於廟諸侯行之於國大夫士行之於家增志明重莫之敢非率是道也又何所惡慢之有詩曰㫖酒欣欣燔炙芬芬公尸燕飲無有後艱盛世之事也神具醉止皇尸載起鼓鐘送尸神保聿歸追盛之意也其足以懽㑹萬國崇報於祖考則一也古之人有言曰善終如始餕其是已尸亦餕鬼神之餘也尸謖君與卿四人餕君起大夫六人餕臣餕君之餘也大夫起士八人餕賤餕貴之餘也士起各執其具以出陳於堂下百官進而撤之下餕上之餘也凡餕之道每變以衆所以别貴賤之等而興施恵之象也記曰廟中者竟内之象也上有大澤則恵必及下顧先後異耳非上積重而下有凍餒之民夫使上有積重之勢下有凍餒之民雖日行餕獻鼓鐘磬管足以聚天下之懽心乎曰聖人在上報本反始使人皆有父之尊有母之親祁寒暑雨不怨其上胡為其有遺民也孟子曰君子之於物也愛之而弗仁其於民也仁之而弗親親親而仁民仁民而愛物聖人而猶有遺民亦寄痼瘝焉而已矣詩云雨我公田遂及我私彼有不穫穉此有不斂穧彼有遺秉此有滯穗伊寡婦之利祭有畀煇胞翟閽者恵下之道也有徳之君為能行此明足以見之仁足以與之能以其餘畀下者也煇者甲吏之賤者也胞者肉吏之賤者也翟者樂吏之賤者也閽者守門之賤者也以至尊既祭之末不忘至賤以其餘畀之是故明君在上則境内之民無有凍餒者矣傳曰旅酬下為上所以逮賤也逮賤之道至於煇胞翟閽而至矣以聖人之不殺也而骨革羽毛取之鳥獸牲牷肥腯供之祭祀以聖人之不刑也而有墨者守門古者刑人不使守門閽之用刑人則自周而降也聖人祭祀而皆畀其餘使諸賤吏亦皆有駿奔將事之意焉天下之懽心則自此聚也易曰澤上於地萃衆萃而澤及之大牲享廟餘以逮下以此教恵猶有惡慢而禍於刑人者古者明君爵有徳而禄有功必賜爵禄於太廟示不敢専也祭之日一獻君降立於阼階之南南鄉所命北面史繇君右執䇿命之再拜稽首受書以歸而舎奠于其廟諸侯之卿天子之大夫士有徳有功天子皆自廟命之示不敢専且勸善也尸飲五君既獻卿降立于阼階之南示不當尊且教謙也卿大夫士各以其䇿舎奠祖廟諸侯行於其國卿大夫行於其家而尚徳貴功重祖敬宗之義達於天下矣詩曰彤弓弨兮受言藏之我有嘉賔中心貺之鐘鼓既設一朝饗之藏之於廟饗之於朝出師而告冡土獻馘而告明堂詩曰乃立冡土戎醜攸行淑問如臯陶在泮獻囚於以昭示天下得其懽心以不怍於先王先公其義則一也孔子對哀公曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大昏為大大昏至矣大昏既至冕而親迎親之也親之也者親之也是故君子興敬為親舍敬是遺親也弗愛不親弗敬不正愛與敬其政之本與公曰冕而親迎不已重乎孔子愀然作色曰合二姓之好以繼先聖之後以為天地宗廟社禝之主君何謂已重乎大昏人道之始也冕而親迎所以教敬愛之始也所以教敬愛者非為敬愛其妻子為敬愛其親也家人之上九曰有孚威如吉冕而親迎威如之謂也威如而後有終有終而後不愧於先君書曰慎厥終惟其始又曰始于家邦終于四海是之謂也又曰昔三代明王之政必敬其妻子也有道妻也者親之主也敢不敬與子也者親之後也敢不敬與夫子是言盖為敬身也敬親則敬身敬身則必敬其妻子故曰身以及身子以及子妃以及妃行此三者則愾乎天下矣故冠昏之禮先王所聚懽心之始也諸侯燕禮之義君立阼階之東南南鄉邇卿大夫皆少進定位也君席阼階之上居主位西面特立莫敢適之義也設賔主使宰夫為獻主臣莫敢亢也不以公卿為賔以大夫為賔明嫌之義也賔入中庭君降一等而揖之君舉旅於賔及君所賜爵皆降再拜稽首升成拜明臣禮也君答拜之禮無不答明君上之禮也臣下竭力盡能以立功於國君必報之以爵禄故禮無不答言上之不虚取於下也上明正道以道民民道之有功然後取其什一是以上下和寧而不相怨也禮無不答以君而答臣是拜揖之重於爵禄也記曰席小卿次上卿大夫次小卿東西為次士庶子以次就位於下獻君君舉旅行酬而後獻卿卿舉旅行酬而後獻大夫大夫行酬而後獻士士行酬而後獻庶子俎豆牲醴薦羞皆有差等所以明貴賤也古之為君者以此敬愛其臣下其臣下猶有不竭力盡能以立功於國者聘禮上公七介侯伯五介子男三介所以明貴賤也介紹而傳命君子於其所尊弗敢質敬之至也三譲而後傳命三讓而後入廟門三揖而後至階三譲而後升所以致尊譲也君使士迎于竟大夫郊勞君親拜迎於大門之内而廟受北面拜貺拜君命之辱所以致敬也受之於廟拜之於廟天子於諸侯之卿猶且如此乎晉文公拜㐮王之命盡禮而恭内史興以為必霸隨㑹聘於周定王親享之郤至告捷於周未將事而飲王尗酒非禮也古之盡禮於聘享者非為其諸侯大夫亦各為先王先公也詩云我孔熯矣式禮莫愆夫猶有勉勉不盡其懽者乎何其言之懃也大夫士相見雖貴賤不敵主人敬客則先拜客客敬主人則先拜主人凡非弔喪非見國君無不答拜者大夫見於國君國君拜其辱士見於大夫大夫拜其辱同國始相見主人拜其辱君於士不答拜也非其臣則答拜之大夫於其臣雖賤必答拜之男女相答拜也適於異國則無不拜也立於同國則始相拜也君不答士而大夫答其臣故為父執而不答其下非禮也禮答之則懽心生不答之則怨心生董生曰人生有喜怒哀樂之答春秋冬夏之類也喜春之之答也怒秋之答也樂夏之答也哀冬之答也天之副在乎人人答天之四時而必忠且愛也則堯舜之治無以加此是之謂也五官之長曰伯是職方其儐於天子也曰天子之吏同姓天子謂之伯父異姓天子謂之伯舅九州之長入天子之國曰牧同姓天子謂之叔父異姓天子謂之叔舅周室至於春秋三百餘年矣列國諸侯或十三四世或十四五世而天子皆稱之曰伯父叔父伯舅叔舅何也曰尊之也親之也尊以生敬親以生愛敬愛出於天子不復為等詩曰寧適不來㣲我有咎是之謂也國君不名卿老世婦大夫不名世臣姪娣士不名家相長妾君大夫之子不敢自稱曰余小子大夫士之子不敢自稱曰嗣子凡若是者所以去慢也去慢而後無所輕侮無所輕侮而後無所遺失無所遺失而猶未可言愛敬也子言之狎侮死焉而不畏也狎侮君子罔以盡人心狎侮小人罔以盡其力書曰左右攜僕夷㣲盧烝文王惟克厥宅心則是可言愛敬者矣君子式黄髪下卿位入國不馳入里必式君命召雖賤人大夫士必自御之敬者逮上愛者逮下苟以先王先公之義通之則愛敬之義逮於上下一也國君式齊牛大夫士式路馬召賤御貴以斯義通之四郊之内誰復可慢者乎賈生曰堯舜禹湯之治天下也士民樂之即位百年士民猶以為數也桀紂之治天下也士民苦之即位皆十年而滅士民猶以為太乆也居於上而敬士愛民之謂智居於上而簡士苦民之謂愚士民不可不畏大族多力不可敵也賈生則知所立本矣未知所立孝也立孝者謂是先王先公之遺民也則猶其遺體也齊牛路馬猶且敬之而况其遺體乎君無故不殺牛大夫無故不殺羊士無故不殺犬豕君子逺庖厨凡有血氣之類弗身踐也至于八月不雨君不舉年不順成天子素服乘素車食無樂君衣布搢本關梁不租山澤列而不賦土功不興大夫不得造車馬甚矣君子之仁也君子之仁足以及物而後孝足以報親仁不足以及物而曰孝子吾不信也國君春田不圍澤大夫不掩羣士不取麛卵嵗凶年穀不登君膳不祭肺馬不食穀馳道不除祭事不縣大夫不食粱士飲酒不樂夫猶此意也而又加至矣蒐苗獮狩之中而亦有孝子焉殺一草一木必以其時則亦謂此也夫有致謹於此而日傲然惡慢其士民者則亦少矣卿大夫疾君問之無筭士壹問之君於卿大夫比葬不食肉比卒哭不舉樂士比殯不舉樂卿大夫之喪公視大斂君升商祝鋪席乃斂天子及隣國之君亦皆使人弔其不淑也若是以待其臣庶則可謂盡矣天子以是待其公卿公卿以是待其大夫士大夫士以是待其隣里族黨無不盡者而後天下之懽心得天下之懽心得而後天下之孝養可聚也故災害旤亂皆天下之戾心為之也民心和平則災害不生旤亂不作賈生曰民無不為本也民無不為命也民無不為功也民無不為力也菑之與福非降在天降之於士民也可不慎乎子曰舜其大孝也與徳為聖人尊為天子富有四海之内宗廟饗之子孫保之故大徳必得其位必得其禄必得其名必得其夀禄位名夀非得天下之歡心而能如此乎歡心不得雖萬乗之禄無以為富九五之尊無以為貴賈生曰君子之貴也士民貴之故曰貴也君子之富也士民富之故曰富也其夀也則亦曰士民夀之故曰夀也桀紂盜跖身没之後民以相詬夫非不得其歡心以至於此乎不得其歡心而有其家國天下是亂臣賊子所以接踵於世也子言之曰後世雖有作者虞帝弗可及也已矣君天下生無私死不厚其子子民如父母有􅉃怛之愛有忠利之教親而尊安而敬威而愛富而有禮恵而能散其君子尊仁畏義耻費輕實忠而不犯義而順文而靜寛而有辨夫虞帝之所以得此則亦曰得天下之懽心而已矣懽心不得則無以事親無以事親又何以教其君子虞帝之教曰吾盡吾敬以事吾上故見為忠焉吾盡吾敬以接吾敵故見為信焉吾盡吾敬以使吾下故見為愛焉是以見親愛於天下之民見貴信於天下之君吾取之以敬也吾得之以敬也故敬者教之本也不遺小臣不侮鰥寡不失臣妾此三者安享天下之本也子曰出門如見大賔使民如承大祭己所不欲勿施於人在邦無怨在家無怨舜之謂也故聖人耐以天下為一家以中國為一人非意之也必知其情辟於其義明於其利達於其患然後能為之聖人之所以治人七情修十義講信修睦尚慈譲去争奪舎禮何以治之乎禮者何曰孝而已孝者何曰敬而已敬者何曰不敢遺失不敢惡慢而已記曰喜怒哀懼愛惡欲七者謂之人情父慈子孝兄良弟弟夫義婦聽長惠幼順君仁臣忠十者謂之人義講信修睦謂之人利爭奪相殺謂之人患夫是數者歸之和平則天下猶之一家中國猶之一人而已故情義利患不如歡心之約也得其歡心則情義利患可以不問也詩曰亦有和羹既戒既平鬷格無言時靡有争是之謂也右傳二十二則聖徳章第九曽子曰敢問聖人之徳無以加於孝乎子曰天地之性人為貴人之行莫大於孝孝莫大於嚴父嚴父莫大於配天則周公其人也天地生人無所毁傷帝王聖賢無以異人者是天地之性也人生而孝知愛知敬不敢毁傷以報父母是天地之教也天地日生人而曰父母生之天地日教人而曰父母教之故父母天地日相配也聖人之道顯天而藏地尊父而親母父以嚴而治陽母以順而治隂嚴者職教順者職治教有象而治無為故曰嚴父不曰順母曰配天不曰配地是聖人之道也知性者貴人知道者貴天知教者貴敬敬者孝之質也古之聖人本天立教因父立師故曰資愛事母資敬事君敬愛之原皆出於父故天父君師四者立教之等也書曰天佑下民作之君作之師惟其克相上帝寵綏四方鳥獸知母而不知父衆人知父而不知天有知嚴父配天之說者則通於聖人之道矣昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之内各以其職來祭夫聖人之徳又何以加於孝乎夫道至於嚴父而至矣周人祀后稷而不祀姜嫄配文王而不配太姒郊社明堂於此則必有取之也郊社之義三代異用也社之言地方澤之義也郊之言天圜丘之制也后稷之配太社則自夏商而始也尊稷以配天則獨周之制也祖文王而宗武王則自成康而始也太王王季不敢言祧皇矣之雅天作之頌是也故議禮者不可不審也郊后稷以配天祀文王以配上帝非周公之聖則莫之為也不當周公之身而議郊祀之禮則禘嚳而郊稷祖文王而宗武王作者之意於是止也明堂之歳有六祀焉四立五帝季秋大享是也南郊有三冬至迎長上辛祈榖龍見大雩是也歳一祀后稷而八享文王聖人之尊親不以疎數為隆殺也其敬益至則其禮益簡簡之者何嚴之也天嚴則曰父父嚴則配天后稷祖也以天之嚴嚴之則亦曰父故配天之父非禰之謂也以嚴而生敬以敬而生孝以孝而生順不如是不足以立教故郊祀明堂性教之合也四海於是觀嚴則於是觀順焉詩曰儀式型文王之典日靖四方盖謂是也夫當文王之身躬集大命則必配稷於南郊配王季於明堂然且文王不為之而文王不以是損孝又留其緒以畀周公詩曰維此王季帝度其心貊其徳音其徳克明克明克類克長克君王此大邦克順克比比于文王其徳靡悔既受帝祉施于孫子夫周人亦猶有宗祀王季之心乎何其言之尊也然則有虞之不郊瞽瞍又不祀於明堂何也曰􅑴徳與功則帝嚳顓頊而下無所置瞽瞍者矣且受終于文祖則勢不得不宗堯宗堯則猶之明堂也至有虞之廟則無所奪瞽瞍之位子曰宗廟饗之孟子曰孝子之至莫大乎尊親尊親之至莫大乎以天下養為天子父尊之至也以天下養養之至也尊以天子養以天下則又何異於享祀明堂之有故親生之膝下以養父母日嚴聖人因嚴以教敬因親以教愛聖人之教不肅而成其政不嚴而治其所因者本也為教本性為性本天天嚴而人敬之地順而人親之敬之加嚴親之加忘人託於地不知有地覆於天惟知有天其漸然也故嚴者始教者也親者終養者也人養於膝下鳥獸昆蟲養於山澤其養之皆地其教之皆天也聖人不嚴其養之而嚴其教之者故人皆知父之尊知母之親以教萬物親親長長老老幼幼不失其所故教愛者不煩教敬者不傷君之於父父之於師師之於天其本一也或曰嚴本於后稷親本於文王然則配天之與配上帝有異與曰天與上帝何異之有周禮典瑞曰祀天又曰旅上帝雖分昊天上帝與五帝之名其為天則一也然則郊祀配天宗祀配上帝何也曰郊祀者犆祀也宗祀者時享也時享五帝而親文王犆祀昊天而尊后稷明堂則數里而近圜丘則數十里而逺近者愈親逺者愈尊仁孝之等也然則礿禘嘗烝又有四杞宗廟明堂每嵗八舉得毋已數與曰其生也日三視膳殁而八享何謂數也然則明堂之與辟雍一與曰明堂九室其别五室辟雍環水有先聖先老焉所謂澤宫也父子之道天性也君臣之義也父母生之續莫大焉君親臨之厚莫重焉性者道也教者義也以養者父子之道日嚴者君臣之義也分愛於母故母有父之親分敬於君故父有君之尊父母生之君親臨之禀於自然實命於天非聖人之所能為也然而聖人不教則天下失性天下失性則天失其命故聖人教人事父以配天事父以配君天言大生君言大臨大生者得善繼大臨者載厚徳故曰父子之道君臣之義父母生之君親臨之言父之上配於天下配於君非聖人則不得其義也故不愛其親而愛它人者謂之悖徳不敬其親而敬它人者謂之悖禮以順則逆民無則焉不在於善而皆在於凶徳雖得之君子不貴也世有不愛其親而愛它人不敬其親而敬它人者無有乎哉天地之道有二一曰嚴一曰順為嚴以教順故天覆於地為順以事嚴故地承於天敬不敢慢愛不敢惡得嚴於天者也敬親而後敬人愛親而後愛人得順於地者也反是為逆逆為凶徳善者性也君子以是教人亦以是自率也是君子之道也孟子曰人少則慕父母知好色則慕少艾仕則慕君不得於君則熱中大孝終身慕父母君子言思可道行思可樂徳義可尊作事可法容止可觀進退可度以臨其民是以其民畏而愛之則而象之故能成其徳教而行其政令孟子曰行一不義殺一不辜而得天下不為也敬愛它人而得富貴君子豈為之乎君子敬天則敬親敬親則敬身嚴父之道雖未配天而身不可不敬也敬身如天則敬親亦如天敬親如天則亦配天矣傳曰在下位不獲乎上民不可得而治矣獲乎上有道不信乎朋友不獲乎上矣信乎朋友有道不順乎親不信乎朋友矣順乎親有道反身不誠不順乎親矣誠身有道不明乎善不誠乎身矣誠者天之道也誠之者人之道也誠者不勉而中不思而得從容中道聖人也誠之者擇善而固執之者也不思誠不擇善苟得以蹈凶逆則是亂民之行聖王之所不教也詩云淑人君子其儀不忒君子而思以淑人善俗非禮何以乎禮儀之在人身所以動天地也孝子仁人必謹於禮謹禮而後可以敬身敬身而後可以事天傳曰大哉聖人之道洋洋乎發育萬物峻極於天優優大哉禮儀三百威儀三千待其人而後行故曰苟不至徳至道不凝焉至徳者孝敬之謂也右經九章大傳第九記曰人者天地之徳隂陽之交鬼神之㑹五行之秀氣也故天秉陽垂日星地秉隂竅於山川播五行於四時和而後月生也是以三五而盈三五而闕五行之動迭相竭也人之生本於月月母也日父也月有盈虧而日無盈闕五行三㑹以歸於月月虚而日滿日立於不竭以待月之竭故日嚴而月順也月行之遲二十餘九乃及於日日行之遲三百六十餘五乃及於天天者君也日者父也月遲成蔀以迎天日五行六㑹而及於已日十二㑹而及於天故月者天下之至孝也天下之至譲也天下之至敬也天下之至順也四者至徳而孝子皆行之何也人月之所生也生而得其秀秀者氣之精柔者也孝子而不法月則無所法之詩曰假以溢我我其収之是之謂也董生曰天之大數畢於十旬聖人立之以為數紀見其起止則知貴賤順逆所在知貴賤順逆所在則天地之情著聖人之實出矣是故陽氣以正月始出養育於上積十月而功成矣人亦十月而生十月而成天之道也物随陽而出入數随陽而終始三王之正随陽更起數日者據晝而不據夜數嵗者據陽而不據隂丈夫雖賤皆為陽婦人雖貴皆為隂以此推之天道皆貴陽而賤隂是則董生之意亦専致於嚴父也嚴父者事天事君之要義也故夫政必本於天殽以降命命降於社之謂殽地降於祖廟之謂仁義降於山川之謂興作降於五祀之謂制度此聖人所以藏身之固也本天而殽命故得人之性本命而殽事故得人之教本性立教故言易立而行易行立言與行而後其身不傷身不毁傷而後可藏於天地故曰聖人所藏身之固也天尊地卑君臣定矣髙卑以陳貴賤位矣動靜有常大小殊矣方以類聚物以羣分則性命不同矣在天成象在地成形如此則禮者天地之别也地氣上隮天氣下降隂陽相摩天地相蕩鼓之以雷霆奮之以風雨動之以四時煖之以日月而百化興焉如此則樂者天地之和也化不時則不生男女無辨則亂升此天地之情也情之不可以騁雖天地猶然也故為禮以别之為樂以和之不别不和則亂升不生雖天地不能自制也故聖人以天地之性制天地之情所謂教也天地貴人而人貴天父君師三者從天者也董生曰孝子之行忠臣之義皆法於地也地事天者也物無有㑹合者天地之合必察其隂陽别其順逆顯經而隠權前徳而後刑故得以變化而成功也又曰天子受命於天諸侯受命於天子子受命於父臣受命於君妻受命於夫諸所受命者其尊皆天也故曰父之子也可尊母之子也可卑尊卑繫於父不繫於母無别則亂升亦嚴父之義也然則天地不可合祭乎曰地之與天不相敵也郊祭天而社祭地也社之所以専祭者為國也為稷也不然則皆天也天之有日月星辰猶地之有嶽鎮河海也日月星辰得周於地嶽鎮河海不得周於天舎嶽鎮河海則無以見地舎日月星辰而猶有以見天雷霆風雨皆出於地而嶽瀆河海皆應於天故地之與天不相敵也然則天地不可分祭乎曰郊社分祭也地之與天則非有二也五帝殊禮三王異建本天者親上本地者親下則各從其類也昔先王之制禮也因其物而致其義焉爾故作大事必順天時為朝夕必放於日月為髙必因丘陵為下必因川澤是故天時雨澤君子達亹亹焉是故因天事天因地事地因名山升中于天因吉土以享帝于郊升中于天而鳳凰降龜龍假饗帝于郊而風雨節寒暑時是故聖人南面而立而天下大治物者天地所生義者仁人孝子所自致也春秋霜露君子亹亹故名山吉土君子所有事也舜禮五嶽封十二山五載一巡狩朝㑹方岳之下然二十八載不能五巡四嶽所以然者天子所至諸侯景從辰極之與日月道不同倣也惟南郊明堂俱在國中天子歳得有事而禘祫之義尚有限年則明禋之儀不能頻舉亦可知矣月令不紀圜丘方澤之文周官不紀明堂四時之祭惟郊祀禘嘗備見諸書故祀天饗祖兩義特重三代雖有方澤之文月令無祀后土之憲秦祀五畤漢用六天遂使汾隂雎上并重禮官川嶽風雷分為異趣仁孝之思牽於靡文失其義矣大樂與天地同和大禮與天地同節和故百物不失節故祀天祭地明則有禮樂幽則有鬼神如此則四海之内合敬同愛矣禮者殊事合敬者也樂者異文合愛者也禮樂之情同故明王以相沿也故事與時并名與功偕合敬合愛天地之情也愛有同和敬有同節聖王之教也同情而均性故曰和同情而殊教故曰節禮各反其所始樂各尊其所生天地隂陽日月寒暑各有等差中其節則和不中其節則不和故教之始於嚴父萬物所受節之始也有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏后氏禘黄帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王神農黄帝皆有明堂則皆有郊祀郊祀不始於虞明堂不始於周而斷以虞周者何也禮於是而備也有虞之不郊瞍而宗堯有夏之不宗舜而郊鯀皆反於本心而安揆於衆理而當質之無疑俟之不惑如在今人則又衆喙繁興互持不下矣凡創禮出於聖人議禮本於天子苟無戾於孝敬皆不失為典章然則文王稱祖武王稱宗武王不得正南面之位與曰禮之貴昭穆也禘祫大饗則始祖東嚮太王文王皆北嚮而稱穆王季武王皆南嚮而稱昭如其月祭七廟各専俱南面也或因廟祭以為昭穆則俱昭穆之何必南嚮之有然則文王武王之在明堂有二主與曰禮無二主文王在明堂則武王在太廟文王配上帝則武王不配上帝何二主之有曰嚴父配天為成王者如之何曰祖即父也有天下者各以創天下之父而父之易世而後始自為祖然猶不敢忘其自始各以昭穆進於七廟天地之義生人之序也燔柴於泰壇祭天也瘞埋於泰折祭地也用騂犢埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽宗祭星也雩宗祭水旱也四坎壇祭四方也山林川谷丘陵能出雲為風雨見恠物皆曰神有天下者祭百神諸侯在其地則祭之無其地則不祭燔柴泰壇壇之南也瘞埋泰折壇之北也泰昭坎壇則猶之南北也四時之於寒暑一也而兩祭之何也暑極則寒生寒極則暑生四時之至極於南北夏至為坎冬至為昭祀二至則近於天地也命之曰昭坎知其為四時也曰寒暑重言之也王宫壇之東也夜明壇之西也雩宗南也幽宗北也禱水旱者必於盛陽之月望星辰者必嚮坎壇之北命之曰雩幽知其為隂陽也四坎壇山林川谷丘陵也雲雷風雨出於川谷丘陵猶人之有嘘氣津澤故古有所不祀也祀四坎壇則四方之嶽瀆川鎮皆載其中風雷雲雨因而從之甚矣古人之㣲也然則隂陽出於天地寒暑生於日月水旱生於寒暑而且祀之何也是即所謂風雲雷雨也言風雲雷雨則地氣也疑於天道言水旱寒暑則天道也通於人事聖賢重人患而急民事故感冬夏而絀霜露夫亦各有其義也然則是言合祀與曰是合祀也而各有其禮樂焉然則周官之不言合祀何與曰各一代之制也周禮冬至祀天于圜丘夏至祀地于方澤大宗伯兆大明於東郊兆夜明于西郊樂舞各殊從配異義然而其文未著所最著者曰祀吴天上帝于圜丘耳然則夫子不取之何也曰聖人之作代各異尚夏時殷輅周冕虞韶則固間用之矣何必周公然則記之合祭何取之與曰各三代之遺也記曰七代所更立者郊禘祖宗其餘不變也然則周公變之何也曰卜洛宅鎬明堂辟雍之義則固有不同者矣然則月令之迎氣詳於四立而簡於二至何也曰月令夏道也首以立春周禮周道也首以冬至首立春者其盛禮見於祈榖首冬至者其盛禮見於秋嘗仁人孝子則各有取之也夫不得仁人孝子之意而言郊祀者亦猶之聚訟而已郊之祭也迎長日之至也大報天而主日也兆於南郊就陽位也掃地而祭於其質也器用陶匏以象天地之性也於郊故謂之郊牲用騂尚赤也用犢貴誠也郊之用辛也周之始郊日以至卜郊受命於祖廟作龜於禰宫尊祖親考之義也孝子愛日迎長履端報天而主日配以祖考受命作龜則盛徳之始事也周始伐殷戊午師逾孟津星與日辰皆在北維析木之津天黿之首日至在焉盖以辛酉祭告天地癸亥陳師㑹朝清明後世因之首冬至而祀上辛至不皆辛也辛則不卜至亦不卜也而猶且卜之盖占歳也故謂之迎長又謂祈榖迎長孝子之事祈榖仁人之志二者可以先後起也然則至日而辛如何曰夏周之道可以兼用也迎長至則不迎短至就陽則不就隂而猶且曰北郊方澤者何也曰鎬洛之異用夏周之殊尚是不可知也然而記者則是夫子之所取也掃地陶匏而為之壇壝三成分羅諸祀何也曰聖人有言汚樽抔飲其勢必變太羮元酒聊從其初則亦其義也得其尊祖親考者而已矣故祭帝於郊所以定天位也祀社於國所以列地利也祖廟所以本仁也山川所以儐鬼神也五祀所以本事也郊在都南社在國中明天之週於地地之不週於天也地不週於天則祀不在郊之外明父之治外母之不得治外也命降於社之為殽地王為羣姓立社曰泰社王自為立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫以下成羣立社曰置社方言謂母曰社母有衆也父一而已祀之去司命與泰厲也進人事而逺鬼神之義也然則明堂南郊又為兩祀乎曰男子治外因尊而尊因親而親歳首南郊四時明堂賔享五帝又何恠乎然則社皆在國郊與明堂皆在郊明堂不逺於廟與曰廟與社之皆在國親親之義也郊與明堂之皆在郊尊尊之義也天子有郊諸侯不出其國等殺之義也然則諸侯之有外祀非禮與曰因天因地苟在祀典則猶之禮也淳于曰明堂在國之陽三里之外七里之内韓嬰曰明堂在南方七里之郊故達霜露則謂之郊具覆幬則謂明堂郊壇之有饗殿則猶之古也諸侯之社不盡在公宫之右則亦猶之古也郊之祭大報天而主日配以月夏后氏祭其闇殷人祭其陽周人祭日以朝及闇祭日於壇祭月於坎以别幽明以制上下祭日於東祭月於西以别外内以端其位日出於東月生於西隂陽長短終始相廵以致天下之和為郊祀之說則莫明於此也天無質以星辰為質昊天五帝則皆其名也天之有主配者日月而已隂陽寒暑雲雷風雨皆生於日日為其功而歸於天日之歸功於天猶父之歸功於君君之歸功於天也故嚴父配天即報天主日之說也主天而配祖主日而配月此兩者古人之精義也其不曰報天而配地何也曰人者天地之心也日者亦猶天之心也敬天而尊其心則諸形質皆下矣地之於人猶腑臟之有包絡也月之於日猶腎水之於君火也聖人之在天地猶羲陽之在六虚無可配者月受其光以為精魄星受其采以為光耀氣受其序以為逺近寒暑融結霜露嘘噏風雷無非日也聖人亦猶之日也以為配天則不得曰主天以為主日則不得曰配日闇之言宣夜昕之言盖彌日之言渾亦猶此義也然則祭日之言壇祭月之易言坎何義也曰壇旦也詩曰旭日始旦坎陷也曰坎為水為月古人之為壇坎則有所取之也然則是猶之泰壇泰折與曰一壇也泰壇泰折自為南北日壇月坎自為東西然則朝日東郊夕月西郊日壇九尺月壇六尺之亦為當於禮與曰聖賢異制三代殊尚古之君子不相非也然而言報天不必言配地言主日不必言配月神明之道異於祖妣必曰天地分合則亦曰日月分合祖妣分合閭巷之義非所精致交於旦明之義也然則日月東西重言之何也曰以明夫郊天之大報大報之主日配祖主日之非兩事也大傳曰天之所覆地之所載日月所照霜露所墜凡有血氣者莫不尊親故曰配天則不必曰配地而尊天之義見不必曰配月而主日之義見不必曰祀禰而尊祖之義亦見也然則日月從於郊東西從其朔有從祀亦有專祀禮與曰禮以義起不相非也而神明之道貴質而賤瀆五帝之道三王亦皆兼用之矣其存者曰享祀明堂而已矣然則祀之有上帝又有五帝何昉與曰五帝之說不自周始盖羲軒而前矣有配天而又有配帝則自周始也既已配帝則不得不言五帝然則五帝之有異義何主與曰主其似五帝者則太皥炎帝黄帝少皥顓頊之為近似也郊所以明天道也帝牛不吉以為稷牛帝牛必在滌三月稷牛唯具所以别事天神與人鬼也萬物本乎天人本乎祖此所以配上帝也郊之祭也大報本反始也天配以祖祖與天並而牲有隆殺何也尊無二上祖之視天猶君之視祖也然則卜牲不吉而猶用之何也天則卜牲祖不卜牲鬼與人親其卜之示尊其不卜之示親非為擇牲也然則明堂之禮帝亦卜牲文王不擇牲祫廟之禮祖亦卜牲禰不卜牲與曰常饗不卜卜特為郊禘而用之帝牲則卜文王不卜夫亦有取之取之帝稷也然則稷非為社與曰社亦滌牛周之稱社非為帝稷盖厲山之子始殖五榖者也天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五大夫三廟一昭一穆與太祖之廟而三士一廟庶人祭於寢祭法曰王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠壇墠有禱亦焉祭之無禱乃止去墠曰鬼諸侯而下等殺祧墠猶是也古之作者尊尊親親七廟創於天子以事祖父謂其功徳始於祖父雖不為天子以天子之禮報之故七廟之設為其祖父非為其孫子也共王不敢祧太王則懿王不敢祧季歴以七世之孫子祧其上世之祖父席富貴而輕本原非開創者之意也然則九廟十一廟祫祭始廟同堂異室孰古者與曰祫廟同堂奉主而祭雖十一廟猶之一廟也殷之相土周之公劉皆有特廟見之於詩其不見於詩而立特廟者髙圍廟是也七制之有特廟自漢始也周三十七君不得各自立廟則必逓進於二祧之廟孝夷不敢祧成康猶厲宣之不敢祧昭穆則上祀四世與下祀四世廣七而十一之未逺於古也上祀四世與始祖而五下祀四世與太祖而五故祖廟者祖宗之孝禰廟者孫子之孝以禰廟而奪祖廟比近而忘逺非尊親之意也書曰典祀無豐于禰言追逺也然則士有二廟而曰一廟何也曰官師之廟也天子之下士諸侯之上士皆得二廟廟降而孝子之意不降祖祖而宗宗尊尊而親親子曰武王周公其達孝矣乎是之謂也别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子所自出者百世不遷者也宗其繼髙祖者五世則遷者也尊祖故敬宗敬宗尊祖之義也敬宗敬諸侯大夫之義也别子分藩有國有家是為别祖其子繼之是為别宗魯伯禽之繼周公鄭武公之繼桓公是百世不遷者也康王之繼成王成王之繼武王非特廟則五世猶遷者也然則繼禰小宗者何也猶周文公召康公之世為卿士受采於京者也不然則繼别子之禰者也宗其繼别子者百世不遷猶始開國者在二世之内宗其繼髙祖者五世則遷猶後禰廟者在四世之外也然則天子無後而外求宗為繼禰者與為繼髙祖者與曰為繼髙祖者也繼髙祖與繼别子二典之大者也繼髙祖之禰與繼别子之禰二典之小者也然則天子諸侯無繼禰而皆繼髙祖與曰其禰在而繼禰受命於禰則是繼禰者也其禰不在而繼禰受命於髙祖則是繼髙祖者也然則君不猶父臣不猶子昭穆之義猶欲行於祖禰與曰朝則分君臣廟則分昭穆五世而外昭穆相繼雖不以次其受命於髙祖為繼髙祖則一也然則繼髙祖者而入禰廟不稱孝子與曰殷之兄弟繼禰者多矣其入廟也皆曰嗣王明曰繼及者之不為繼禰也謂有髙祖之統焉不祧禰而祧祖不繼祖而繼禰是禮之大疵也然則漢宋之議禮非與曰漢宋之禮有受命於禰者也無受命於禰而繼髙祖則皆繼髙祖者也然則禰廟入嗣昭穆相次亦誼不為父子與曰殷七八王無為父子者其稱嗣王曽孫與嗣天子其義一也自仁率親等而上之至于祖自義率祖順而下之至于禰是故人道親親也親親故尊祖尊祖故敬宗敬宗故収族収族故宗廟嚴宗廟嚴故重社稷重社稷故愛百姓愛百姓故刑罰中刑罰中故庶民安庶民安故財用足財用足故百志成百志成故禮俗刑禮俗刑然後樂詩云不顯不承無斁于人斯此之謂也聖人之治天下教敬教愛而不言用賢者何也曰古之王者皆重世族其卿大夫士皆出公族三代之王則猶同祖也季世王者皆出庶姓其卿大夫士亦皆庶姓物博精多權勢相負故以公族絀於庶姓其漸然也然則孝經之未及於用人何也曰親愛者用人之實也大傳曰聖人南面而聽天下所先者五民不與焉一曰治親二曰報功三曰舉賢四曰使能五曰存愛五者一得民無不足無不贍者五者一物紕繆民莫得其死是聖人之言用賢也敬其所尊愛其所親尊賢而親親是嚴父所配於天地也不然則是庶社之智也唯聖人為能饗帝孝子為能饗親饗者鄉也鄉之然後能饗焉是故孝子臨尸而不怍君牽牲夫人奠盎君獻尸夫人薦豆卿大夫相君命婦相夫人齊齊乎其敬也愉愉乎其忠也勿勿諸其欲其饗之也故敬愛者聖人之極思也睦族必敬宗敬宗必尊祖尊祖必敬天敬天必不敢惡慢於天下子言之誦詩三百未足以一獻一獻矣未足以饗旅臨尸而不怍饗帝而不荒則是可言郊祀者矣饗祀貴嚴男子治外而獻薦之事君夫人俱何也曰南郊外也太廟内也饗廟則猶之内事也然則髙禖公宫不猶在郊外與曰蠶室在公宫之陽利於浴川公宫在國社之東則猶在國中也髙禖之祀青帝不必在於南郊夫亦猶之内事也且是不嵗舉之也謂國之大典存焉耳然則大明在東夜明在西君冕在東階夫人副褘在西房若是其敵也而獨曰嚴父者何也曰嚴父者天地之義也崇陽而卑隂尊天而主日助祭者孝子之義也嗣續有所始宗社有所託且是猶之嚴事也非是則庶子庶婦擅於公族故古人之愛敬各有所自著也子曰郊社之義所以仁鬼神也禘嘗之禮所以仁昭穆也饋奠之禮所以仁死䘮也射鄉之禮所以仁鄉黨也食饗之禮所以仁賔客也明乎郊社之義禘嘗之禮治國其如指諸掌乎仁孝一也孝為主而仁為賔賔主之答皆敬也皆有其祖徳而孫遜以行之郊社禘嘗所為主者皆子也饋奠射鄉食饗所為主者皆弟也其答之皆曰仁其行之皆曰敬其為主者皆孝也非孝則先王又何以仁天下乎天子者與天地參故徳配天地兼利萬物與日月並明明照四海而不遺㣲小其在朝廷則道仁聖禮義之序燕處則聴雅頌之音行歩則有環佩之聲升車則有和鸞之音居處有禮進退有度百官得其宜萬事得其序詩云淑人君子其儀不忒其儀不忒正是四國此之謂也参天地而法日月皆孝也先王以孝制治以敬制禮以其性教敷順於天下大則保其天下細則保其身體因嚴因愛無有毁傷萬物之心故禘嘗之義五禮之大端也記曰禘嘗之義大矣治國之本也不可不知也明其義者君也能其事者臣也不明其義君人不全不能其事為臣不全夫義者所以濟志也諸徳之發也是故其徳盛者其志厚其志厚者其義章其義章者其祭敬祭敬則竟内之子孫皆敬矣故郊社之義周公所以教敬也言思可道行思可樂徳義可尊作事可法容止可觀進退可度非以教敬而能如是乎右傳十七則孝經集傳卷二
