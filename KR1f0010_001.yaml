body:
  text: 孝經集傳卷一明黄道周撰開宗明義章第一仲尼居曽子侍子曰先王有至徳要道以順天下民用和睦上下無怨女知之乎順天下者順其心而已天下之心順則天下皆順矣因心而立教謂之徳得其本則曰至徳因心而成治謂之道得其本則曰要道道徳之本皆生於天因天所命以誘其民非有强於民也夫子見世之立教者不反其本将以天治之故𤼵端於此焉曽子曰參不敏何足以知之子曰夫孝徳之本也教之所由生也本者性也教者道也本立則道生道生則教立先王以孝治天下本諸身而徴諸民禮樂教化於是出焉周禮至徳以為道本敏徳以為行本孝徳以知逆惡雖有三徳其本一也復坐吾語女身體髮膚受之父母不敢毁傷孝之始也立身行道揚名於後世以顯父母孝之終也教本於孝孝根於敬敬身以敬親敬親以敬天仁義立而道徳從之不敢毁傷敬之至也為天子不毁傷天下為諸侯大夫不毁傷家國為士庶不毁傷其身持之以嚴守之以順存之以敬行之以敏無怨於天下而求之於身然後其身見愛敬於天下身見愛敬於天下則天下亦愛敬其親矣故立教者終始於此也夫孝始于事親中于事君終于立身始于事親道在于家中于事君道在天下終于立身道在百世為人子而道不著于家為人臣而道不著于天下身殁而道不著手百世則是未嘗有身也未嘗有身則是未嘗有親也天子之事天亦猶是矣詩曰我其夙夜畏天之威于時保之保身之與保天下其義一也大雅云無念爾祖聿修厥徳徳修則道立道立則名成君子之修徳不為名也書曰七世之廟可以觀徳君子一不敬而墜七世之廟毁傷一人而毁及百世之宗詩曰商之孫子其麗不億上帝既命侯于周服君子敬身如敬天周家三世皆有孝徳乃命于天武王數紂之罪曰謂己有天命謂敬不足行謂祭無益謂暴無傷其道正反故君子修徳敬身之為貴也右經第一章孝經舊本凡十八章一千七百七十三字所以埏埴五經綱紀萬象也石䑓本皆依劉向所校河間獻王得於顔芝者獨標題差殊耳近儒皆疑四孝俱有引詩而庶人獨否似有闕文又聿修之義大雅所告天子無忝之詠小宛以朂庶民欲移大雅以𤼵天子之端推無忝以起庶民之例於説亦通然於首章文義未終於過節𤼵端多礙小宛之賦雖通於庶人有慶之義反疎於侯國又攷匡衡論政治疏中稱聿脩厥徳孝經引為首篇則是匡衡而上韓嬰疏廣皆然不必劉向矣凡孝經之義不為庻人而𤼵其自舜文而下獨推周公以愛敬為道徳之原豫順為禮樂之實雖曽子論孝十章未有能闡其意者盖曽子之㣲言授於子思而中庸之精義𤼵于孟子㳺夏之徒㣲分敬養以𢎞禮樂之施曲臺諸儒兼採質文以収道徳之委至其精義備在孝經舜文復起無所復易也劉炫繆以閨門之語溷於聖經朱子誤以聖人之訓自分經傳必拘五孝以𤼵五詩則厥失維均去古愈逺矣大傳第一凡傳皆以釋經必有旁引出入之言孝經皆曽子所受夫子本語不得自分經傳而游夏諸儒所記曽子孟子所傳實為此經羽翼故復備採之以􅑴淵源云子曰君子無不敬也敬身為大身也者親之枝也敢不敬與不能敬身是傷其親傷其親是傷其本傷其本枝從而亡不敢毁傷厚其本也有子曰君子務本大學曰其本亂而末治者否矣然則毁傷何謂也曰暴棄之謂也孟子曰言非禮義謂之自暴吾身不能居仁由義謂之自棄也暴棄其身則暴棄其親膚髪雖存有甚於毁傷者矣詩曰各敬爾儀天命不又子曰君子言不過辭動不過則百姓不命而敬恭如是則能敬其身能敬其身則能成其親矣言動不過百姓敬恭百姓之於君子亦猶之膚髪也君子以天下為身體百姓為膚髪怨惡生於下則毁傷著於上和睦無怨則百體用康周書曰若徳裕乃身不廢在王命又曰嗚呼小子封恫瘝乃身敬哉是之謂也子曰君子也者人之成名也百姓歸之名謂之君子之子是使其親為君子也是為成其親之名也已親之愛子不為其身之名也而子毁其名則親傷其身幽厲之于文武有餘恫者矣書曰恐人倚乃身迂乃心予迓續乃命于天是先王之仁也子曰古之為政愛人為大不能愛人不能有其身不能有其身不能安土不能安土不能樂天不能樂天不能成其身易曰樂天知命故不憂安土敦乎仁故能愛不安土則不敦仁不樂天則不知命不敦仁不知命不有人旤則有天刑詩曰敬之敬之天惟顯思命不易哉無曰髙髙在上所以教成身者也哀公問曰敢問何為成身孔子對曰不過乎物仁人不過乎物孝子不過乎物是故仁人之事親也如事天事天如事親是故孝子成身物者天之所生也天之生物使之一本身體髪膚家國天下皆物也其本則皆性也能盡其性則能盡人之性能盡人之性則能盡物之性三徳六行脩於身三事六府脩於外不過乎物不逺乎身皆親也則皆天也天子事天士庻事親其本于誠敬純一不已則一也子曰舜其大孝也與徳為聖人尊為天子富有四海之内宗廟享之子孫保之故大徳必得其位必得其禄必得其名必得其夀故天之生物必固其材而篤焉夫舜而有過物乎哉舜亦成物而已成物則成親成親則成天成天則成身故如舜而後為成身者也哀公曰敢問何貴乎天道也孔子對曰貴其不已如日月東西相從而不已也是天道也不閉其乆是天道也無為而成是天道也已成而明是天道也天道者何誠之謂也誠以成己誠以成物誠者敬也不敬則無終始無終始則無物無物則無親無親則無天詩曰天生蒸民有物有則中庸曰誠者自成也而道自道也誠者物之終始不誠無物仁人不過乎物孝子不過乎物敬以成始敬以成終日月東西起而相從詩曰維天之命於穆不已於乎不顯文王之徳之純如文王則所謂純孝者也公明儀問於曽子曰夫子可謂孝乎曽子曰是何言與是何言與君子之所謂孝者先意承志諭父母於道參直養者也安能孝乎身者親之遺體也行親之遺體敢不敬乎故居處不莊非孝也事君不忠非孝也涖官不敬非孝也朋友不信非孝也戰陣無勇非孝也五者不遂災及其身敢不敬乎曽子之告公明儀亦猶夫子之告子游也五者不遂毁傷其身五者而遂亦毁傷其身則曽子奚取之乎曰吾取其敬者而已祭而受福戰而必克遜言危行吾未見夫忠君勇戰而死者矣死而無所毁傷則猶之成身者也曰其道存焉爾曽子曰君子之所謂孝者國人皆稱願焉曰幸哉有子如此所謂孝也父母既殁慎行其身不遺父母惡名可謂能終也夫仁者仁此者也義者宜此者也忠者中此者也信者信此者也禮者體此者也行者行此者也彊者强此者也樂自順此生刑自反此作七徳者皆敬也慎行其身不遺惡名非惡其聲而然也國人稱願有子如此非要譽而為之也逺刑而近名逺名而近刑君子則皆不為也君子慎行而已慎行則近于道矣然則曽晳未為不道也而曽子自謂諭親未能何也曰曽子揚親者也曽子以言行遜其親先意承志則有所未逮也詩曰教誨爾子式榖似之曽子之謂也曽子曰君子旤之為患辱之為畏見善恐不得與焉見不善恐其及己也是故君子疑以終身立身行道何疑之有疑而後思思而後有終詩曰永言孝思孝思維則曽子曰言不逺身言之主也行不逺身行之本也言有主行有本謂之有聞矣君子尊所聞則髙明矣行所知則廣大矣髙明廣大無它在加之意而已矣加意無它曰敬慎而已君子之言如吹箎其出之益細則聞之益逺行如集木其䖏上愈髙則視下滋懼矣毁傷之言曽子歾身焉曽子豈有近於刑名者乎曰吾之所知所聞不過如此而已曽子曰人言不善而不違近於說其言説其言殆於以身近之也殆於以身近之殆於身之矣人言善而色葸焉近於不說其言不說其言殆於以身近之也殆於以身近之殆於身之矣身於為不善者君子不入也殆於不善則亦㡬殆矣以是立身猶未至於行道也而道本諸身恒必由之書曰乃奉其恫汝悔身何及是曽子所謂終身守此惮惮也曽子曰孝子不登髙不履危痺亦弗馮不苟笑不苟訾隱不命臨不指居易俟命不興險以徼幸孝子㳺之暴人違之出門而使不以或為父母憂也險途隘巷不求先焉以愛其身不敢忘其親也是猶未至於行道也然不如是不足以行道君子不外道而求身不外身而求道孟子曰道在邇而求諸逺事在易而求諸難人人親其親長其長而天下平又曰孰不為事事親事之本也孰不為守守身守之本也故如是則可謂知本者矣詩曰凡百君子各敬爾身胡不相畏不畏扵天敬親之與敬天其致一也樂正子春曰吾聞之曽子曽子聞諸夫子曰天之所生地之所養人為大矣父母全而生之子全而歸之可謂孝矣君子一舉足不敢忘父母一出言不敢忘父母一舉足不敢忘父母故道而不徑舟而不游不以父母之遺體行殆一出言不敢忘父母是故惡言不出於口忿言不及於己然後不辱其身不憂其親則可謂孝矣是亦未至扵行道也然至於是而道不行者鮮矣為天子者以天下全歸於天為諸侯者以社稷全歸其祖為卿士者以祿位全歸其君一言一行不道忘其親久而後成親成親而後成天成天而後成詩曰成王不敢康夙夜基命宥宻是之謂也曽子曰草木以時伐焉禽獸以時殺焉吾聞諸夫子斷一樹殺一獸不以其時非孝也夫如是則可謂不毁傷者矣不毁傷其身以不毁傷萬物不毁傷天下虞書曰疇若予上下草木鳥獸商書曰暨鳥獸魚鼈咸若盡人盡物之性參賛天地則亦庶乎此也孟子曰人皆有不忍人之心先王有不忍人之心斯有不忍人之政以不忍人之心行不忍人之政治天下可運扵掌上故曰天子者天之孝子也孝子事親仁人事天不過乎物孔時則亦曰時而已時者天地所為大順也詩曰孔惠維其盡之子子孫孫勿替引之右傳十四則天子章第二子曰愛親者不敢惡於人敬親者不敢慢於人愛敬盡於事親而徳教加於百姓刑於四海葢天子之孝也天子者立天之心立天之心則以天視其親以天下視其身以天視親以天下視身則惡慢之端無由而至也故愛敬者禮樂之本中和之所由立也惡人以惡其親慢人以慢其親則雖庶人不為也夏書曰予視天下愚夫愚婦一能勝予一人三失怨豈在明不見是圗予臨兆民凛乎若朽索之馭六馬為人上者柰何不敬敬者愛之實也愛敬盡於事親而惡慢消於天下惡慢不生中和乃致不言徳教而徳教盡於是詩曰恵于宗公神罔是怨神罔是恫刑于寡妻至于兄弟以御于家邦是之謂也甫刑云一人有慶兆民頼之易曰來章有慶譽吉慶譽皆孝也皆福也天子以孝事天天以福報天子兆民百姓皆其髪膚又何不利之有賈生曰三代之禮天子春朝朝日秋暮夕月所以明有敬也春秋入學坐國老執醤而親饋之所以明有孝也行以鸞和歩中采齊趨中肆夏所以明有度也其扵禽獸見其生不忍見其死聞其聲不忍食其肉故逺庖厨所以長恩且明有仁也食以禮徹以樂失度則史書之工誦之三公進而讀之宰夫减其饍是天子不得為非也明堂之位曰篤仁而好學多天聞而道慎天子疑則問應而不窮者謂之道道者道子以道者也常立於前是周公也誠立而敢㫁輔善而相義者謂之充充者充天子之志也常立於左是太公也潔亷而切直匡過而諫邪者謂之弼弼者拂天子之過者也常立於右是召公也博聞而強記㨗給而善對者謂之承承者承天子之遺忘者也常立於後是史佚也故成王中立而聼朝則四聖維之是以慮無失記而舉無過事殷周之所以長久者以其輔翼天子有此具也及秦而不然其俗固非貴禮義也所尚者刑罰也故趙髙傅胡亥而教之獄所習者非斬劓人則夷人之族也故今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若刈草菅然豈胡亥之性惡哉其所習道之者非其理故也存亡之變治亂之機其要盡在是矣天下之命縣於太子太子之善在於蚤諭教與選左右夫胡越之人生而同聲嗜慾不異及其長而成俗也絫數譯而不能相通臣故曰選左右蚤諭教最急夫教得則左右正左右正則太子正太子正而天下定矣書曰一人有慶兆民賴之記曰一人元良萬邦以貞賈生之言未及於教孝也然於愛敬之義則近矣右經第二章大傳第二子曰立愛自親始教民睦也立敬自長始教民順也教以慈睦而民貴有親教以敬長而民貴用命孝以事親順以聼命錯諸天下無所不行商書曰立愛惟親立敬惟長始於家邦終於四海此愛敬之始教也記曰致愛則存致慤則著著存不忘乎心此愛敬之本事也聖人而以性教天下則舍愛敬何以矣愛敬者禮樂之所從出也以禮樂𨗳民民有不知其源以愛敬𨗳民民乃不沿其流故愛敬者徳教之本也舍愛敬而談徳教是覇主之術非明王之務也孟子曰人之所不學而能者其良能也所不慮而知者其良知也孩提之童無不知愛其親也及其長也無不知敬其兄也親親仁也敬長義也無它達之天下也仁義者徳教之目也徳教者敬愛之目也語其目則有仁義禮智慈恵忠信恭儉語其本則曰愛敬而已天有五行著於星辰而日月為之本日是生敬月是生愛敬愛者天地所為日月也治天下而不以愛敬猶舍日月而行於晝夜也然則孩提之童有稍長而不知愛敬者何也曰其習也非性也其所飬之者非道也賈生曰春秋之元詩之闗雎禮之冠婚易之乾坤皆慎始敬終云耳故君子為子孫婚嫁必擇孝悌世世有行義者如是則其子孫慈孝無滛暴不善故曰鳯凰生而有仁義之意虎狼生而有貪戾之心兩者不等各以其母嗚呼戒之哉無養乳虎將傷天下故曰素成胎教之道青史記之曰古者胎教之道王后有身之七月而就蔞室太師持銅而御戸左太宰持斗而御户右太卜持蓍龜而御堂下諸官皆以其職御於門内此三月者王后所求聲音非禮樂則太師撫樂而稱不習所求滋味非正味則太宰荷斗而不敢煎調太子生而泣太師吹銅曰聲中某律太宰曰滋味上某太卜曰命云某然後為王太子懸弧者東方之􅋃以梧梧者東方之草春木也其牲以雞雞者東方之牲也南方之􅋃以栁栁者南方之草夏木也其牲以狗狗者南方之牲也中央之􅋃以桑桑者中央之木也其牲以牛牛者中央之牲也西方之􅋃以棘棘者西方之草秋木也其牲以羊羊者西方之牲也北方之􅋃以棗棗者北方之草冬木也其牲以彘彘者北方之牲也五􅋃五分矢四方皆三射四􅋃具餘各二分矢懸諸國四通門之左中央之􅋃亦餘二矢懸諸社稷門之左然後卜王太子之名上毋取扵天下毋取扵地中毋取於也名山通谷毋悖於鄊俗是故君子名難知而易諱此所以養息之道也周后妃姙成王立而不跛坐而不差笑而不喧獨䖏而不倨雖怒而不詈胎教之謂也成王生仁者養之孝者襁之四賢傍之成王有知而前有與計後有與慮也若是則可謂豫為愛敬之至矣故曰知所以為人子而後知所以為人父也知所以為人弟而後知所以為人兄也知所以為人臣而後知所以為人君也射者各射己之鵠亦本於此也故不知教之義者則亦不可以立性矣孟子曰愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸己其身正而天下歸之孟子曰君子之所以異於人者以其存心也君子以仁存心以禮存心仁者愛人有禮者敬人愛人者人恒愛之敬人者人恒敬之有人於此其待我其以横逆君子必自反也曰我必不仁自反而仁矣横逆猶是也君子必自反也曰我必無禮也自反而有禮矣其横逆猶是也曰我必不忠是故君子有終身之憂無一朝之患也乃若所憂則有之舜人也我亦人也舜為法於天下可傳於後世我猶未免為鄉人也是則可憂也憂之如何如舜而已矣夫舜非敬愛其親不惡慢天下而能使天下愛敬之如此乎孟子曰天下大悅而將歸已視天下悦而歸已猶草芥也惟舜為然不得乎親不可以為人不順乎親不可以為子舜盡事親之道而瞽瞍底豫瞽瞍底豫而天下化瞽瞍底豫而天下之為父子者定古之以孝徳而王天下者莫舜若也舜之愛敬盡於事親而徳教加於百姓刑於四海自愛敬而外舜亦無所事也曰以吾之愛敬萃萬國之懽心若此而已修政之記曰帝舜曰吾盡吾敬以事吾上故見為忠焉吾盡吾敬以接吾敵故見為信焉吾盡吾敬以使吾下故見為愛焉是以見愛親於天下之民而見貴信於天下之君故吾取之以敬也吾得之以敬也愛者敬之情也敬者愛之志也非志無情非敬無愛故以一敬而教忠教順教仁教讓是文王之學之所從出也詩云穆穆文王於緝熈敬止子曰為人君止於仁為人臣止於敬為人父止於慈為人子止於孝與國人交止於信文王之五止則自敬始也文王為世子朝于王季日三雞初鳴而衣服至於寢門之外問内豎曰今日安否内豎曰安文王乃喜日中至如之日暮至亦如之有不安節内豎以告文王色憂行不能正履王季復膳然後復末初食上必在視寒煖之節食下問所膳命膳宰曰原應諾然後退文王之卑服田功懐保小民恵鮮鰥寡亦猶此志也文王以其敬而為人君故見為仁焉以其敬而為人父故見為慈焉以其敬而接國人故見為信焉故文王者得大舜之志者也然則孝經之稱周公不稱大舜何也曰舜君道也天道也周公臣道也子道也弟道也周公於臣弟兼盡焉故尊舜而親周公然則舜之饗宗廟保子孫何也曰郊廟異義國天下異制以聖人視之法於天下垂於後世與郊父傳子者葢未有以異也故文王者得大舜之志周公者得大舜之事也子言之君子之所謂義者貴賤皆有事於天下天子親耕粢盛秬鬯以事上帝故諸侯勤以輔事天子然則天子親耕粢盛亦自舜始與曰郊禘之義皆不自舜始也耕耤視學葢亦猶是矣凡惡慢之生皆生於無事有事而後愛敬生愛敬之始事為天子耕耤田王后織𤣥紞夫婦有事以致孝扵天地宗廟及其終事諸侯大夫合愛合敬以薦助天子於是有朝聘燕享貴貴老老長長幼幼之務故言愛敬之典者必始於耕耤中於齒胄終於養老詩曰假以溢我我其收之駿恵我文王曽孫篤之是孝經之行事與春秋俱始也昔者天子為耤田千畝冕而朱紘躬秉耒諸侯為耤百畝冕而青紘躬秉耒以事天地山川社稷先古以為醴酪粢盛於是乎取之敬之至也天子耕其耤田三推一墢諸侯而下以次加等庶人終之自是天子不賤王榖不多取田賦不惡慢胼胝之士謂是天地山川社稷先古之手澤力食存焉耳昔者天子諸侯必有養獸之官及嵗時齊戒沐浴而躬朝之犧牷祭牲必於是取之君召牛納而視之擇毛而卜之吉然後養之君皮弁素積朔月月半廵牲所以致力孝之至也天子諸侯皆躬視牲廵擇卜吉自是天子不濫取禽獸知萬物嘉惡登耗不惡慢川虞林麓之士謂是天地山川社稷先古之歆享孳育存焉耳昔者天子諸侯必有公桑蠶室近川而為之築官仭有三尺棘墻而外閉之大昕之朝君皮弁素積卜三宫夫人世婦之吉者入蠶室奉種浴於川桑於公桑風戾以食之嵗單世婦卒蠶奉繭以告於君遂獻繭於夫人夫人副褘受之少牢以禮之及良日夫人繅三盆手遂布於三宫夫人世婦之吉者使繅遂朱綠𤣥黄之以為黼黻文章服既成君服以祀先王先公敬之至也王后夫人皆躬蠶桑紝織紘綖以供祭服自是天子知杼軸艱難女紅勞勩不敢惡慢韋布麻枲之士謂是天地山川社稷先古之服物章采存焉耳卜郊受命於祖廟作龜於禰宫尊祖親考之義也卜之日王立於澤親聼誓命受教諫之義也郊之祭也䘮者不敢哭凶服者不敢入國門敬之至也天子以天事其親諸侯不敢祖天子大夫不敢祖諸侯恐有踰等以惡慢其上天子又推天親之意以敬禮其諸侯大夫曰是皆天之所生親之所命者因之以為燕享勞與故自庻人而上亦皆有享帝享親之意是分天子之慶譽者也祭之日君牽牲穆答君卿大夫序從既入廟門麗於碑卿大夫袒而毛牛尚耳鸞刀以刲取膟膋乃退爓祭祭腥而退敬之至也天子致愛其親則致敬於物親射牲袒割詩曰維羊維牛維天其右之又曰自堂徂基自羊徂牛鼐鼎及鼒夫以為牛羊則何貴之有以謂是天子所躬射袒割廵禮而致之則是其愛敬也至矣詩曰執其鸞刀以啟其毛取其血膋是非獨卿大夫之事也葢自是天子而下庶民而上無有惡慢及扵禽獸者天子廵狩諸侯待於竟天子先見百年者八十九十者東行西行者弗敢過西行東行者弗敢過欲言政者君就之可也天子愛親則愛其近於親者敬親則敬其近於親者耄悼不刑七十而上有過則微矣雖多忘則亦聞知矣且其子姓多在也天子而有惡慢不使老者見之葢自是諸侯卿大夫無有惡慢及於煢寡者天子設四學當入學而太子齒食三老五更於太學天子袒而割牲執醤而饋執爵而酳冕而總干立於舞位天子謂不逮養其親也而養三老五更曰使天下皆養其親則是天子之養其親也天子既養其老則太子必齒其胄齒胄者更老之始也詩曰維桑與梓必恭敬止靡瞻非父靡依非母是之謂也凡三王養老皆引年八十者一子不從政九十者其家不從政瞽亦如之凡父母在子雖老不坐有虞氏養國老於上庠養庻老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庻老於左學周人養國老於東膠養庻老於虞庠虞庠在國之西郊國老庶老皆老也文王善養天下皆歸之謂其有敬愛之實焉武王數紂之罪曰力行無度播棄黎老謂其有惡慢之實焉惡慢及於一人則怨恫起於百姓㣲子曰乃罔畏畏咈其耉長殷周之間治亂之所由分可不慎乎昔者有虞氏貴徳而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒周人貴親而尚齒虞夏殷周天下之盛王也未有遺年者年之貴乎天下久矣次乎事親者也天子而致力於事親則舍養老何舉乎天子負扆而立先朝之公卿則多耄年者矣其大夫士則多耆艾者也而天子以惡慢獨聞將敬其所敬而愛其所愛則先世之臣無有存者入廟愾然何以事其親大雅之終篇曰嗚呼哀哉維今之人不尚有舊凡養老五帝憲三王有乞言五帝憲養氣體而不乞言有善則記之為惇史三王亦憲既養老而後乞言亦㣲其禮皆有惇史乞言之禮微謂不敢以煩長者也不敢以煩長者而猶且乞之敬之至也覇者之乞言猶曰毋使吾君得罪於羣臣百姓而况於王者乎詩曰雖無老成人尚有典刑板之詩曰匪我言耄爾用憂謔周書曰法人維重老重老維寳曽子曰孝子之養老也樂其心不違其志樂其耳目安其寢處以其飲食忠養之孝子之身終是故父母之所愛亦愛之父母之所敬亦敬之至於犬馬盡然而况人乎養老之於養親一也中庸曰敬其所尊愛其所親事死如事生事亡如事存孝之至也夫父母所敬愛敬愛之其不可敬愛如之何曰不敢惡慢焉已矣曽子曰可人也吾任其過不可人也吾辭其禍又曰父母殁將為善思貽父母令名必果將為不善思貽父母羞辱必不果孝子之愛敬亦貽親以令也焉有不令而貽其親者乎詩曰媚兹一人應侯順徳永言孝思昭哉嗣服右傳十六則諸侯章第三在上不驕髙而不危制節謹度滿而不溢髙而不危所以長守貴也滿而不溢所以長守富也富貴不離其身然後能保其社稷而和其人民葢諸侯之孝也諸侯受命於天子天子受命於天故天子之於天諸侯之於天子其事之皆如子之事親也周頌曰載見辟王曰求厥章言其制度出於天子非諸侯所得自與也夫以天子不敢惡慢於人以諸侯而驕溢則旤適随之矣諸侯之有耕耤蠶桑泮宫庠序宗廟社稷人民道皆侔於天子其稍殺者謹節之耳諸侯而不謹節猶支庶子之僭濫於祖父也商頌曰不僭不濫不敢怠遑是則庶乎可言敬愛者矣詩云戰戰兢兢如臨深淵如履薄冰甚矣諸侯之危也為人子而負驕寵又逺於膝下則其危也不亦宜乎故臨淵履薄者諸侯之學無以異於曽氏之學也曽子曰殺六畜不當及其親吾信之矣使民不以時失國吾信之矣殺六畜不當及親則是世無可殺者也使民不以時失國則是世無可使者也刀鋸不敢加於六畜鞭扑不敢加於徒役則是無以國也無以國而猶得保和之業謂是天子之所宥也商頌曰歳事來辟勿予禍適稼穡非懈是之謂也右經第三章大傳第三諸侯之於天子也比年一小聘三年一大聘五年一朝天子五年一廵守嵗二月東廵守至於岱宗柴而望祀山川覲諸侯問百年者就見之命太師陳詩以觀民風命市納賈以觀民之好惡志淫好辟命典禮考時月定日同律量禮樂制度衣服以正之山川神祗有不舉者為不敬不敬者君削以地宗廟有不順者為不孝不孝者君絀以爵變禮易樂者為不從不從者君流革制度衣服者為畔畔者君討有功徳於民者加地進律五月南廵守至於南嶽如東廵守之禮八月西廵守至於西嶽如南廵守之禮十有一月北廵守至於北嶽如西廵守之禮歸假於祖廟用特不敬不孝不順天子所以致諸侯之討也天子五年一廵守諸侯將修其文以葢其實或善事天子之左右内交于鄰國則天子如之何曰其文之弊不勝其質之著也其君有驕志者則必有驕色有溢志者必有溢態驕志溢態達於面目見於其左右近習著於田疇城郭雖仆襲之固莫掩也且其權衡量度貢賦章物先告之矣而又有旱乾水溢勤民不勤民之務著於謡謌别於訟獄其社稷宗廟實載以白於天子故諸侯莫之掩也且使其可以文著則亦與為文焉耳文質之間天子所自反也頌曰無封靡于爾邦維王其崇之康誥曰徃盡乃心無康好逸豫是則天子所自為愛敬也天子自為愛敬而諸侯敢於驕溢未之有也天子將出類乎上帝宜乎社造乎禰諸侯將出宜乎社造乎禰孔子曰諸侯適天子必告於祖奠於禰冕而出視朝命祝史告於社稷宗廟山川乃命國家五官而後行道而出告者五日而徧過是非禮也凡告用牲幣反亦如之諸侯相見必告於禰朝服而出視朝命祝史告於五廟所過山川亦命國家五官道而出反必親告於祖禰乃命祝史告至於前所告者而後聼朝而入諸侯無故不出疆謂有宗廟社稷之世守存焉朝于天子與諸侯相見則既有辭矣觀魚觀社㑹婦人則何以命之為祝史者不己難乎然則魯之祝史無有執者何也曰終春秋之世兩如京師皆非正朝也而諸侯㑹盟嵗或四五所過山川亦曰予知之矣愛其所愛敬其所敬愛非其所親敬非其所尊天子不得而慶讓之也春秋書公至自外者五十有九始于唐中於戚終於黄池傷於桓危於成衰於昭其未至也未嘗不汲汲之其至也未嘗不幾喜之謂其出而無可告於天子反而不可告於祖禰也且使其五官疲焉不知所從事則亦為天子失柄者之過矣天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓚然後為鬯未賜圭瓚則資鬯於天子天子命之敎然後為學小學在公宫南之左大學在郊天子曰辟雍諸侯曰頖宫頖宫之禮有以異扵辟雍乎曰其釋奠於先老先師齒胄弦誦合語合樂養老養幼一也而憲乞異典矣詩曰載色載笑匪怒伊教又曰無小無大從公于邁是頖宫慈而辟雍嚴也諸侯之於天子亦猶母之於父也將命以柷以鼗何也柷終也鼗始也分天子之養敬為四海之終始或曰柷從重節制之義也鼗從輕鼓舞之義也天子諸侯無事則嵗三田一為乾豆二為賓客三為充君之庖無事而不田曰不敬田不以禮曰暴天物天子不合圍諸侯不掩羣天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車佐車止則百姓田獵諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕庶人無故不食珍凡所以防人之驕危也一嵗三田以習戎事軍賔吉凶四禮合舉則在於田也田以殺而禦殺自四學而外三田為大訊馘之告於學則辟頖同義也子曰道千乗之國敬事而信節用而愛人使民以時其事則天子之事其用則宗廟社稷山川之用其人民則猶先君之人民也而諸侯無創焉夫稱南面而常若子姓者其惟諸侯乎孟子曰諸侯危社稷則變置犧牲既成粢盛既潔祭祀以時然而旱乾水溢則變置社稷遺老失賢掊克在位雖成犧牲潔粢盛無以辭於水旱而獨以水旱咎之社稷何也曰是猶子之事親也無所改扵怨怒而逺其居室變其飲食是亦一道也則甚矣為諸侯之危也以社稷事君又以社稷事天非極其愛敬而能保有此乎孟子曰諸侯之寳三土地人民政事寳珠玉者殃必及身土地人民政事則天子先君之遺也珠玊則非天子先君之遺也雖遺之而愛敬之義不在也故曰君子之所異於人者以其存心也君子以仁存心以禮存心仁者愛人有禮者敬人是亦天子之志也詩曰維其有章矣是以有慶矣是亦孝子之事也孟子曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下也如惡之莫如貴徳而尊士賢者在位能者在職國家閒暇及是時明其政刑雖大國必畏之矣貴徳尊士謂不惡慢於人者也不惡慢於人而後能尊賢而後能使能孝經之義未至官人也以謂不愛不敬雖官人而有惡慢者存焉非仁人而能愛敬如此乎孟子曰萬乗之國弑其君者必千乘之家千乘之國為弑其君者必百乗之家萬取千焉千取百焉不不多矣苟為後義而先利不奪不饜未有仁而遺其親者也未有義而後其君者也仁者愛之質也義者敬之質也重仁義而輕富貴則憂敬之心殷重富貴而輕仁義則弑逆之禍著矣然則富貴不離其身何謂也曰身者父母之身也諸侯之富貴則其父母之仁也以父母之仁仁父母之身於諸侯奚有焉故不驕不溢君子之所貴也子曰貧而好樂富而好禮衆而以寧者天下其幾矣詩云民之貪亂寧為荼毒故制國不過千乗都城不過百雉家富不過百乗以此坊民諸侯猶有畔者天下之畔亂則皆富貴之過也見夫茹蔬躡蹻而與簒弑者凡幾哉富貴而後驕溢驕溢而後壊坊子曰丘也聞有國有家者不患寡而患不均不患貧而患不安葢均無貧和無寡安無傾故和順者國家之福也書曰和恒四方民居師和恒則愛敬愛敬而時雍之化可兾也子曰天無二日民無二王家無二主尊無二上示民有君臣之别也春秋不稱椘越之王䘮禮君不稱天大夫不稱君恐民之惑也為諸侯而僭天子為大夫而僭諸侯惡慢長而愛敬衰易曰履霜堅冰至子曰臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辨之不蚤辨也蚤辨之非大順而能之乎易初為元士二為大夫三為諸侯日大昕為大夫食時為諸侯日中為天子古之仁人孝子則必有辨於此者矣子曰下之事上也雖有庇民之大徳不敢有君民之心仁之厚也是故君子恭儉以求役仁信讓以求役禮不自尚其事不自尊其身儉於位而寡於欲讓於賢卑己而尊人小心而畏義求以事君得之自是不得自是以聼天命詩云莫莫葛藟施於條枚豈弟君子求福不回其舜禹文王周公之謂與有君民之大徳有事君之小心舜禹文王周公則可以為孝矣如舜禹文王周公之孝則可為諸侯師矣皇矣之詩曰維此四國爰究爰度上帝耆之増其式廓夫上帝之選子甚於天子諸侯之選子也而謂諸侯可以不學者已乎右傳八則卿大夫章第四非先王之法服不敢服非先王之法言不敢道非先王之徳行不敢行服者言行之先見者也未聼其言未察其行見其服而其志可知也仁人孝子一舉足不忘父母一發言不忘父母由父母而師先王故有父之親有君之尊有師之嚴雖不言法而法見焉孟子曰子服堯之服誦堯之言行堯之行是堯而已矣子服桀之服誦桀之言行桀之行是桀而已矣夫非先王之車服言行而敢於服之不疑非桀紂而敢如此乎詩曰心之憂矣於我歸説是故非法不言非道不行口無擇言身無擇行言滿天下無口過行滿天下無怨惡三者備矣然後能守其宗廟葢卿大夫之孝也言而後世法之曰法行而天下由之曰道孟子曰舜為法於天下可傳於後世夫豈有它曰孝而已孝子終日言不在尤之中終日行亦不在悔之中也子曰言寡尤行寡悔禄在其中矣無它慎之也詩曰豈弟君子干禄豈弟葢其慎也易曰言行君子之所以動天地也可不慎乎詩曰夙夜匪懈以事一人卿大夫之事天子亦猶之事其親也而尊嚴倍之矣諸侯處優而卿大夫處劇公侯之得失邦國之治不治天子不責於諸侯而責於卿大夫故卿大夫之愛敬合於天下而後致於天子非仲山甫則未可語此也右經第四章大傳第四子曰君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也庸徳之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾甚矣仁人孝子之多所不敢也行孝而不敢言孝則不敢言人之不孝者行仁而不敢言仁則不敢言人之不仁者然則君子皆無所敢乎曰敢於為仁孝而已身為之而口不復言之故少過於己而寡怨於人然則伯夷叔齊之言行不及泰伯仲雍與曰其仁孝則一也天下之於夷齊何惡之有詩曰在彼無惡在此無斁庻幾夙夜以永終譽夷齊之謂也夫夷齊而有不顧之言行者乎雖無宗廟不毁其身子曰仁之難成久矣惟君子能之君子不以所能者病人不以人所不能者愧人是故聖人之制行也不制以己使民有所勸勉愧耻以行其言是故君子服其服則文以君子之容有其容則文以君子之辭遂其辭則實以君子之徳君子耻服其服而無其容耻有其容而無其辭耻有其辭而無其徳耻有其徳而無其行夫是則有耻矣可以言孝乎有耻而不可言孝則其言是孝者負耻也子貢曰博無不學其貌恭其徳敦於人也無所不信其接夫人也常以皓皓是以眉夀是曽参之行也夫曽子一至於此乎天下有道則卿大夫之選也子曰長民者衣服不貳從容有常以齊其民則民徳壹詩云彼都人士狐裘黄黄其容不改出言有章行歸於周萬民所望子曰為上可望而知也為下可述而志也則君不疑於臣臣不惑於其君伊誥曰惟尹躬及湯咸有一徳夫是則有恒矣可以言孝乎有恒而不可言孝則是孝無恒也易曰風自火出家人君子以言有物而行有恒仁人孝子不過乎物則是有恒之物也子貢曰夙興夜寐諷詩崇禮行不貳過稱言不苟是顔淵之行也在貧如客使其臣如藉不遷怒不深怨不録舊罪是冉雍之行也夫顔冉之行一至於此乎天下有道則卿大夫之選也子曰王言如絲其出如綸王言如綸其出如綍故大人不倡㳺言可言也不可行君子弗言也可行也不可言君子弗行也則民言不危行而行不危言矣詩云淑慎爾止不諐於儀夫是則淑慎矣可以言孝乎而見夫孝不淑慎者乎人臣而為王者之言傳之百世行之四方禮樂以成兵戎以興上下相危則禍亂難平詩曰肅肅王命仲山甫將之邦國若否仲山甫明之子貢曰學以深厲以㫁送迎必敬上友下絞銀手如㫁是卜商之行也夫卜商則亦從事於此矣使之執筆故其徳可頌也夫謂孝子之言倡㳺者乎子曰苟有車必見其軾苟有衣必見其敝人苟或言之必聞其聲苟或行之必見其成夫是則庶乎旡妄矣旡妄可以言孝乎而見夫孝子多妄者乎虞書曰敷奏以言明試以功車服以庸言功車服相稽而生所謂法也子貢曰先成其慮及事而用之是故不妄子言之欲能則學欲知則問欲善則訊欲給則豫是言偃之行也此五君子者聖門所謂孝子也一未遇明主也子曰言從而行之則言不可飾也行從而言之則行不可飾也故君子寡言而行以成其信則民不得大其羙而小其惡詩曰允矣君子展也大成夫是則庶乎成信矣成信可以言孝乎夫道至於成信而止矣子言之畏天而敬人服義而行信孝乎父而恭乎兄好從善而斆徃葢趙文子之行也其事君也不敢愛其死然亦不亡其身謀其身不遺其友陳則進不陳則退葢随武子之行也其為人之淵泉也多聞而難誕也不内辭足以沒世國有道其言足以生國無道其黙足以成葢銅鞮伯華之行也是三君子者則嘗為卿士大夫矣孝經之義未至於退黙也而随㑹伯華皆有之葢猶之不毁傷之志也是聖人之所貴也曽子曰君子博學而孱守之㣲言而篤行之行必先人言必後人君子終身守此悒悒行無求數有名事無求數有成身言之後人揚之身行之後人秉之君子終身守此憚憚君子不絶小不殄㣲也行自㣲也不㣲人人知之則願也人不知苟吾自知也君子終身守此勿勿也君子見利思辱見惡思詬嗜慾思耻忿怒思患君子終身守此戰戰也君子有此四守者以守其宗廟則保家之令主也使己無㣲過則易使人無㣲過則難身免於患而後可以圖國家之憂子言之外寛而内直自設於隐括之中直己而不直人以善存亡汲汲葢蘧伯玊之行也蘧伯玉未至於為治也然亦可以為孝矣曽子曰君子慮勝氣思而後動論而後行行必思言之言必思復之復之必思無悔亦可謂慎矣人信其言從之以行人信其行從之以復復宜其類類宜其年亦可謂外内合矣君子之言信於家則行信於國家國之言行各以類合易曰父父子子兄兄弟弟夫夫婦婦詩曰其類維何室家之壼君子萬年永錫祚𦙍是衛武公之行也衛武公為周卿士九十矣而猶以言行自抑子貢曰獨居思仁公言言義三復白圭是南宫縚之行也夫子信其仁妻以兄子則謂南宫縚錫類者乎曽子曰君子己善亦樂人之善也己能亦樂人之能也己雖不能亦不以援人君子好人之為善而弗趣也惡人之為不善而弗疾也君子不先人以惡不疑人以不信不説人之過成人之美義則有常善則有隣苟有徳焉不求盈於人君子不絶人之歡不盡人之禮來者不豫徃者不慎去之不謗就之不賂亦可謂忠矣君子恭而不難安而不舒遜而不謟寛而不縦恵而不儉直而不徑亦可謂知矣君子不如是則其言行有擇有擇則有過有過則怨惡莫之免也夫其為道已多矣為忠莫如恕為知莫如慎能恕以慎又何多求之有乎子貢曰髙柴執親之䘮夫子以為難能也開蟄不殺則天道也方長不折則恕也恕則仁也湯敬以恕故曰躋夫有日躋之君子以為公卿不亦可乎曽子曰君子亂言弗殖神言弗致也衆信弗主靈言弗與人言不信不和不唱流言不拆辭不陳人以所能言必有主行必有法親人必有方多知而無親博學而無方好多而無定者君子弗與也君子多知而擇焉博學而算焉多言而慎焉博學而無行進給而不譲好直而徑儉而好僿者君子弗與也夸而無耻彊而無憚好勇而忍人者君子弗與也亟達而無守好名而無體忿怒而為惡足恭而口聖而無常位巧言令色能小行而篤君子弗與也夫是則君子多所弗與者矣多所弗與而免於怨惡者何也多與則多累多累則多祸言行滿於天下尤悔亦滿於天下君子有擇於人而後無擇於身詩曰薄汚我私薄澣我衣害澣害否葢言擇也采采芣苢薄言采之采采芣苢薄言有之言無擇也甫刑曰敬忌而罔有擇言在躬夫非仲山甫衛武公而能如此乎如仲山甫衛武公之為卿士則可與言孝者矣右傳十則士章第五資於事父以事母而愛同資於事父以事君而敬同故母取其愛而君取其敬兼之者父也故以孝事君則忠以敬事長則順忠順不失以事其上然後能保其祿位而守其祭祀葢士之孝也父則天也母則地也君則日也受氣於天受形於地取精於日此三者人之所由生也地亦受氣扵天日亦取精於天此二者人之所原始反本也故事君事母皆資扵父履地就日皆資於天二資者學問所由始也子曰厚於仁者薄於義親而不尊厚於義者薄於仁尊而不親母親而不尊君尊而不親以父教愛而親母之愛及扵天下以父教敬而尊君之敬及扵天下故父者人之師也教愛教敬教忠教順皆於父焉取之因父以及師因師以及長愛敬忠順不出於家而行著於天下周公曰文王我師也周公豈欺我哉詩云夙興夜寐無忝爾所生葢言學也孝不待學而非學則無以孝無以孝亦無以教也記曰𤼵應憲求善良足以䛕聞不足以動衆就賢體逺足以動衆未足以化民君子如欲化民成俗其必由學乎夙興夜寐葢言學也非學為従政而已也右經第五章大傳第五記曰為人子者三賜不及車馬故州閭鄉黨稱其孝也兄弟親戚稱其慈也僚友稱其弟也執友稱其仁也交游稱其信也見父之執不謂之進不敢進不謂之退不敢退不問不敢對此孝子之行也凡昏冠之禮皆始於士故資愛資敬則士其始也為士者其荘矣而有油油之心焉守親之業拜君之賜六行之中無取於義故獨以慈弟仁信聞國君下齊牛式宗廟大夫士下公門式路馬乗路馬必朝服載鞭策不敢授綏左必式步路馬必中道以足蹙路馬芻有誅齒路馬有誅大夫士有同禮者而士加謹矣故大夫禮毖於卿士毖於大夫然則乗路馬何禮也謂五路之御也御必皆士矣朝服載鞭不敢授綏如其君在也如其君在則如其父在也蹴芻齒馬之有誅何也不敗君事者也敗君事者雖貴而猶誅之况路馬乎然且士未之敢也士必有其父士必有其兄士必有其大夫卿魯人之謡曰洫洫乎秋乎攸乎深慮而淺謀邇身而遂志家臣而君圖是南蒯氏之行也凡執主器執輕如不克執主器操幣圭璧則尚左手行不舉足車輪曳踵立則磬折垂佩主佩倚則臣佩垂主佩垂則臣佩委執器者不皆士也而士從此知學矣是猶之跪屨掬袂之禮也然而已進矣晏子曰堂上之禮君行一則臣行二凡敬皆倍也不倍不順是晏平仲之行也君使士射不能則辭以疾言曰某有負薪之憂侍於君子不顧問而對非禮也士之始選於澤宫皆射也而曰不能何也負薪之憂肩臂之疾也疾可以見於君而不可以先長者父母之憂則君亦憂之故辭非飾也所以廣孝也君子行禮不求變俗祭祀之禮居䘮之服哭泣之位皆如其國之故謹脩其法而審行之謂有先君卿大夫之治焉謂有宗老家相之事焉是猶之負劍辟咡之禮也然而已進矣然則禮失之俗如之何曰變則不正正則不變變而正之是滕世子之行也去國三世爵祿有列於朝出入有詔於國若兄弟宗族猶存則反告於宗後去國三世爵祿無列於朝出入無詔於國惟興之日從新國之法若是者何不忘親也不忘先也不保祿位不守祭祀而猶有保祿位守祭祀之思焉道興而猶未忘廢也道廢而猶未忘興也詩曰無逝我梁無𤼵我苟亦資敬之意也君子已孤不更名已孤暴貴不為父作諡己孤則愛篤己貴則敬篤也己之名命於親父之名易於君士而可以顯親雖韋布猶之顯親也士而不可以顯親雖鍾鼎無以殉死者然則上祀追之王何也曰是王者之禮也王者繼嗣不得用開創禮故有身為王者不禰其父者矣而况於士乎而况於暴貴者乎然則身為王者不禰其父禮乎曰己過於禮也然有禮意存焉君子將營宫室宗廟為先廐庫為次居室為後凡家造祭器為先犧賦為次養器為後無田祿者不設祭器有田祿者先為祭服君子雖貧不鬻祭器雖寒不衣祭服為宫室不斬於丘木國君去其國止之曰柰何去社稷也大夫曰柰何去宗廟也士曰柰何去墳墓也國君死社稷大夫死衆士死制故為國君愛敬其社稷為大夫愛敬其宗廟為士愛敬其墳墓則災害不生而禍亂不作矣然則士值危國如之何曰忠順不失未至於死亡也未至於死亡何失忠順之有孟子曰無罪而殺士則大夫可以去無罪而戮民則士可以從士患失其忠順不患失其祿位士患失其祿位則不足以為士矣大夫士去國祭器不踰竟大夫寓祭器於大夫士寓祭器於士大夫士去國踰竟為壇位鄉國而哭素衣素裳素冠徹緣鞮屨素簚乘髦馬不蚤鬋不祭食不説人以無罪婦人不當御三月而復服若是乎䘮祿位失祭祀之重也故保祿位守祭祀亦聖人之所貴也孟子曰士之失位猶諸侯之失國家也禮曰諸侯耕助以供粢盛夫人蠶繅以為衣服犧牲不成粢盛不潔衣服不備不敢以祭惟士無田則亦不祭牲殺器皿衣服不備不敢以祭則不敢以宴亦不足弔乎是亦父母之所弔也天子視不上於祫不下於帯國君綏視大夫衡視士視五歩凡視上於面則敖下於帶則憂傾則奸單襄公曰目以處義足以歩目目體不相従何以能久故視者精神之治也愛敬存於中則奸傲去於靣矣黄目彛之貴者也使衡而綏照於五歩之内故以坐則知起問則知對酬則知酢也是士為公尸神而明之之道也君命大夫與士肄在官言官在府言府在庫言庫在朝言朝朝言不及犬馬輟朝而顧不有異事必有異慮故輟朝而顧君子謂之固在朝言禮問禮對以禮固者不足以語禮故亦謂之瞽也士與大夫肄則譲於大夫與卿肄則譲於卿愛敬之𤼵猶近於不學慮者也而何異慮之有乎凡士相見贄冬用雉夏用腒左脰奉之以价請見主人凡三辭見三辭贄不獲乃見之既見賔交拜送贄出賔再燕見主人三還贄曰既得見矣不獲乃受之士見於大夫終辭其贄於其入也一拜其辱也賔退送再拜若常為臣者則禮辭其贄曰某也辭不得命不敢固辭賔入奠贄再拜主答一拜賔出凡三還贄賔受而去之下大夫相見以鴈上大夫相見以羔其見於君也不還贄以彌蹙為度士相見之受贄為還拜也見大夫之不受贄謂不還拜也受贄而不還拜唯君而已士以君事其大夫則己過然猶不失為忠順也周霄問於孟子曰士出疆必載贄何也曰士之仕也猶農夫之耕也農夫豈為出疆舍其耒耜哉曰晉國亦仕國也未聞仕如此其急仕如此其急君子之難仕何也曰丈夫生而願為之有室女子生而願為之有家父隙母之心人皆有之不待父母之命媒妁之言鑽穴相窺踰墻相従則父母國人皆賤之矣古之人未嘗不欲仕也又惡不由其道不由其道而徃者與鑽穴隙之類也體父母之意以道稱仕其惟儒者乎子貢問士子曰行己有耻使於四方不辱君命可為士矣敢問其次子曰宗族稱孝焉鄉黨稱弟焉孝弟其猶有耻辱與其行己未篤與愛其身不辱其父兄守其宫庭不出四方得其始端而遺其中終是王祥劉殷之行也曰王劉之才及於四方矣而訾之何也曰是猶未免於耻辱也潁考叔之挾輈不如曹沫之反地也故逺於恥辱之難也王子墊問曰士何事孟子曰尚志何謂尚志曰仁義而已矣殺一無罪非仁也非其有而取之非義也居惡在仁是也路惡在義是也居仁繇義大人之事備矣殺草木六畜非其時孝子不為也食非仁人之粟孝子不為也仁義之於孝弟非兩也以孝弟而為仁義猶不惡慢之於愛敬也故曰堯舜之道孝弟而已矣曽子曰君子不貴興道之士而貴有耻之士也若繇富貴興道者與貧賤吾恐其或失也若繇貧賤興道者與富貴吾恐其羸驕也有耻之士富不以道則耻之貴不以道則耻之貧賤不以道則非吾耻也執仁與義而行之未篤故也夫婦㑹於墻隂明日或揚其言矣胡為其莫之聞也甚矣曽子之言似夫子也興道之士柔行似仁強言似義多聞似博歛機似約深息似静釣名似正與時好惡似忠似順然其意不過以為富貴也而人主以為興道使去其富貴而反於貧賤則一無耻之士而已無耻之士不足與於仁義則不足與於禮樂而曰以才興道吾不信也子言之儒有難得而易祿也易祿而難畜也非時不見不亦難得乎非義不合不亦難畜乎先勞而後祿不亦易祿乎其近人有如此者孝子不絶人亦不自絶也不求仕亦不逃名仁義之粟則受之言行可以自見則見矣惡慢人而食其食則孝子不為也夫子之稱子羽也曰貴之不喜賤之不怒苟利於民亷於事上以佐其下獨富獨貴則必不為也是澹臺㓕明之行也子言之儒有居處齊難坐起恭敬言必先信行必中正道塗不争險易之利冬夏不爭隂陽之和愛其死以有待也養其身以有為也其備豫有如此者養其親則敬其身敬其身則愛其死故道有不死於其名臣有不死於其君君以道死則死之不以道死則不死也中道而止當門而處雖有暴政不更其所是晏平仲之行也子言之儒有今人與居古人與稽今世行之後世以為楷適弗逄世上弗援下弗推䜛謟之民有比黨而危之者身可危也而志不可奪也雖危起居竟信其志猶將不忘百姓之病也其憂思有如此者危其身以伸其志孝子亦豈為之乎立行之士不諧於時固其所也匹夫納溝哲人所傷以身之危易百姓之病孝子猶且為之曽子曰士不可以不𢎞毅任重而道逺仁以為己任不亦重乎死而後已不亦逺乎是曽子之志也子言之儒有内稱不辟親外舉不辟怨程功積事推賢而進達之不望其報君得其志苟利國家不求富貴其舉賢援能有如此者若此則可謂敬愛者矣孝子事親就養無方忠臣事君就養無方以無方之賢就無方之養卿大夫之為也士為之則已上然且有為之者雖或比黨而危之不疑也是祁奚羊舌肸之行也曽子曰可以託六尺之孤可以寄百里之命臨大節而不可奪也天下有道則亦卿大夫之選也子言之儒有澡身而浴徳陳言而伏靜而正之上弗知也麤而翹之又不急為也不臨深而為髙不加少而為多世治不輕世亂不沮同弗與異弗非也其特立獨行有如此者若此則可謂忠順者矣以此之為而猶為祭祀祿位者乎儒行所言自立者五強學力行一也見死不更二也戴仁抱義三也雖危竟伸四也推賢忘報五也而陳伏靜正者猶為特獨故聖人所言忠順非世之所謂忠順者也世之所為忠順者猶資愛於其保姆也子言之儒有上不臣天子下不事諸侯慎靜而尚寛強毅以與人博學以知服近文章砥礪亷隅雖分國如錙銖不臣不仕其䂓為有如此者不臣不仕可以為士亦可以為孝子乎士有尊於諸侯士有貴扵卿大夫立身行道則其自與也曽子曰宫中雍雍外焉肅肅朋友切切兄弟怡怡逺者以貌近者以情立其所能逺其所不能無失所守亦可以終身也孟子曰居仁由義大人之事備矣夫孝子之於天下何不備之有孝子而必資祿以為祭資位以為祀則卿大夫而下無孝子也子言之徳恭而行信終日言不在尤之内貧而樂卑而尊是老萊子之行也易行以俟命居下位不援其上觀於四方不忘其親苟思其親不盡其樂以不能學為終身之憂是介山之推之行也故如介山之推則可以語學者矣右傳二十則庻人章第六用天之道分地之利謹身節用以養父母此庶人之孝也君子資於天地得其尊親小人資於天地得其樂利小人資其力君子資其志君子致其禮小人致其事其要於敬養不敢毁傷則一也然則君子不言養小人不言敬何也顯親揚名則養也謹身節用則敬也若子之有廟祀小人之有畆澮大小殊致有身則一愛敬忠順與為謹節何以異乎謹節則不傷不傷則不毁不傷不毁則言行皆滿於天下言行皆滿於天下則皆可配於天地矣然則夫子於庶人微其詞何也曰庶人明於人非明人者也則於人非則人者也至徳要道不之總也故此之此之者微之也謂夫士君子而尚庶人之事者也庶人之於卿士猶諸侯之於天子也故自天子至於庶人孝無終始而患不及者未之有也不敢毁傷孝之始也立身顯親孝之終也謹身以事親則有始立身以事親則有終孝有終始則道著於天下行立於百世不愛其身而惡慢乘之小則毁傷其身大則毁傷天下曽子曰旤患由生自纎纎也君子夙絶之夙絶之如何曰敬而已矣君子未有不敬而免於患者也右經第六章大傳第六子云小人皆能養其親不敬何以辨父子不同位以厚敬也書云辟不辟忝厥祖子不乗父父不乗祖所以著辨也子不忝父父不忝祖所以終始也不能立身不能率祖而曰能養小人之義也故無念爾祖聿脩厥徳者始孝之事夙興夜寐無忝爾所生者終孝之事也曽子曰孝有三大孝不匱中孝用勞小孝用力博施備物可謂不匱矣尊仁安義可謂用勞矣慈愛忘勞可謂用力矣尊仁安義何勞之有言夫為仁義而不備物者也不備物則備力父母有憂之然而無患人之患富貴有甚於患筋力者也曽子曰仁者殆恭者不入慎者不使正直者邇於刑弗違則殆於罪君子錯在髙山之上深澤之汙聚橡栗藜藿而食之生耕稼以老十室之邑夫其父之志也夫亦其子之志也夫子㳺問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎大祀之尚明水也大享之尚太羮也兩者非以為養也君子之敬父母尊於天地明於日月道塞而反於隴畆亦猶有郊社之意焉馬之喣沫雖報不享又何倣焉曽子曰烹熟羶香嘗而進之非孝也養也子夏問孝子曰色難有事弟子服其勞有酒食先生饌曽是以為孝乎記曰孝子之有深愛者必有和氣有和氣者必有愉色有愉色者必有婉容嚴威儼恪非所以事親也然則敬者無儼恪與曰敬之有儼恪自享祀始也養從愛始者也孝經之道有三曰嚴曰順曰敬嚴從父也順從母也孝養之義從母者也然則是獨從愛乎曰愛至而敬亦至敬至而色亦至矣參損㳺夏皆孝也用之不同曽卜致敬言閔致和和者敬之通也曽子曰民之本教曰孝其行之曰養養可能也安為難安可能也乆為難久可能也卒為難卒事慎行則可謂能終也若是則曽子自為能養也曽子擇孝取下焉而猶以為難則是庶人之孝未為降也孟子曰曽子養曽晳必有酒肉將徹必請所與問有餘必曰有曽晳死曽元養曽子必有酒肉将徹不請所與問有餘曰亾矣将以復進也此所謂養口體者也若曽子則可謂養志也故敬之降為養養之下無降焉保祿祀而下則亦無降也故孝子之詩至於苞栩而衰矣周書曰嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛逺服賈用孝養厥父母厥父母慶自洗腆致用酒則洵矣其庻人之義也子言之君子反古復始不忘其所繇生也是以致其敬𤼵其情竭力從事以報其親不敢弗盡也身生於父成於君始於祖本於天地知其所由生則知其所由成知其所由成則知其所由立政教禮樂亦由此為義也天子竭力以行禮樂諸侯竭力以行政教其明報不同而𤼵情致敬竭力従事則一也詩曰我孔熯矣式禮莫愆又曰靡有不孝自求伊祜故謂小孝用力用力之不及致敬者亦有未盡也子路見於夫子曰有人於此夙興夜寐手足胼胝面目黧黒藝五榖以事其親而無孝子之名者何也子曰意者身未敬耶色不順耶辭不遜耶古人有言曰衣與食與何以無孝之名意者所友非仁人耶坐吾語女雖有國士之力不能自舉其身君子愛以事親敬以友賢何為無孝子之名乎詩曰朋友攸攝攝以威儀曽子則嘗從事於此也夫事親信友獲上治民君子亦嘗置力於此也曽子曰君子進則能達退則能靜豈貴其能達哉貴其有功也豈貴其能靜哉貴其能守也夫惟進之何功退之何守故君子有二觀焉君子進則益上之譽損下之憂不得志不安貴位不博厚祿負耜而行道凍餓而守仁是君子之功守也故祿養者非君子之得已也猶不得於道而得於畎畆之義也君子動靜以為立身進退以為終始有不功之功不利之利曽子言之徃而不可還者親也至而不可待者年也吾嘗仕齊禄不過鍾釡欣欣而喜非為貴也親歾之後南㳺於椘榱題二圍轉轂百乗北鄉涕泣非為賤也君子有後名不若昕夕之養故顯名揚親亦非君子之得已也以為不得已而不敢自己是終始之義也曽子曰人之生也百嵗之中有疾病焉有老幼焉君子思其不復者而先施焉親戚既歾雖欲孝誰為孝年既耆艾雖欲弟誰為弟故孝有不及弟有不時慎始思終其是之謂與甚矣曽子之仁也不及孝而思孝不及弟而思弟人之性也耄耋而思立身毁敗而思行道則亦晩矣君子慎始而慮終孩提立孝老死而不倦詩曰我日斯邁而月斯征昔者子夏食於曽子曰是不已費乎曽子曰君子有三費飲食不在其中有三樂琴瑟不在其中子夏曰何為三樂曰有親可畏有君可事有子可遺此一樂也有親可諫有君可去有子可怒此二樂也有親可養有君可諭有友可助此三樂也何為三費曰少而學之長而忘之此一費也事君有功而輕負之此二費也久與之交而中絶之此三費也夫孩提行孝老而不就立身耆艾而猶有咎其為費也不亦多乎詩曰天生蒸民其命靡諶靡不有初鮮克有終言性習之中變而仁孝之不易也曽子曰先憂事者後樂事先樂事者後憂事昔者天子日旦思其四海之内戰戰惟恐不能乂諸侯日旦思其四封之内戰戰惟恐失損之大夫士日旦思其官職戰戰惟恐不勝庻人日旦思其事戰戰惟恐刑罰之至也故臨事而栗者鮮不濟矣故臨深履薄天子庶人之所共學也愛敬之心不勝惡慢始事而勤終事而怠自謂無所毁傷而毁傷者驟至矣丹書曰敬勝怠者吉怠勝敬者㓕義勝欲者從欲勝義者凶夫為人子行孝而至無終始非以欲勝義而然乎勝義㓕仁禍患乃成孟子曰君子有終身之憂無一朝之患也乃若所憂則有之舜人也我亦人也舜爲法於天下可傳於後世我猶未免為鄉人也是則可憂也憂之如何如舜而已若夫君子所惡則無矣非仁無為也非禮無行也如有一朝之患則君子不患矣子言之仁有數義有長短大小中心㦧怛愛人之仁也率法而强之資仁者也詩云豐水有芑武王豈不仕詒厥孫謀以燕翼子數世之仁也國風曰我躬不閲皇恤我後終身之仁也夫世豈有仁而終身者乎亦豈有不仁而終其身者乎以敬成孝以孝成仁能終其身則能及扵百世矣亦何長短大小之有丹書曰凡事不強則枉弗敬則不正枉者㓕廢敬者萬世師尚父曰且臣聞之以仁得之以仁守之其量百世以不仁得之以仁守之其量十世以不仁得之以不仁守之必及其世孟子謂是尚父之言未是也不仁而可以得天下則是不孝而可以奉宗祀也孟子曰天子不仁不保四海諸侯不仁不保社稷卿大夫不仁不保宗廟士庶人不仁不保四體夫能行愛敬終始其身則可謂仁者矣豊芑之詩何多譲焉子曰中心安仁者天下一人而已大雅曰徳輶如毛民鮮克舉之我儀圖之維仲山甫舉之愛莫助之子曰詩之好仁如此鄉道而行中道而廢忘身之老也不知年數之不足也俛焉日有孳孳斃而後已若是則可謂有終始者矣仲山甫之稱為仁何也謂有始終也令儀令色小心翼翼文王之事也不畏強禦不侮矜寡成湯之智也以保其身王躬是保舜禹之義也有是三者以率民彛以正物則性立而教著於天下則非獨立身而已也孟子曰吾身不能居仁由義謂之自暴也又曰謂其君不能者賊其君者也鄉道而行中道而廢則亦命也以為朝夕不放於日月則君子有所不可也大學曰自天子以至於庶人壹是皆以脩身為本其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也五孝雖殊敬身一也敬身則敬親敬親則敬天敬天則成親成親則成身成身而其身大於天下矣孟子曰人有恒言皆曰天下國家天下之本在國國之本在家家之本在身身厚則萬物皆厚身治則萬物皆治身毁則萬物皆毁身傷則萬物皆傷矣虞書曰敬修其可願又曰慎厥身修思永夫非愛敬終始而能如此乎右傳十二則孝經集傳卷一
